parity-verify-sol-provenance = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- verify-sol-provenance"

# Validation-smoke subcommands.
registry-confirm = "run --quiet --manifest-path scripts/validation-smoke/Cargo.toml -- registry-confirm"
wasm-runner-setup = "run --quiet --manifest-path scripts/validation-smoke/Cargo.toml -- wasm-runner-setup"
wasm-runner-refresh = "run --quiet --manifest-path scripts/validation-smoke/Cargo.toml -- wasm-runner-refresh"
