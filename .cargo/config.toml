[alias]
# Policy-maintainer subcommands.
check-enum-policy = "run --quiet --manifest-path scripts/policy-maintainer/Cargo.toml -- check-enum-policy"
check-panic-allowlist = "run --quiet --manifest-path scripts/policy-maintainer/Cargo.toml -- check-panic-allowlist"
check-deny-unknown-fields = "run --quiet --manifest-path scripts/policy-maintainer/Cargo.toml -- check-deny-unknown-fields"
check-workspace-versions = "run --quiet --manifest-path scripts/policy-maintainer/Cargo.toml -- check-workspace-versions"
check-msrv-notice = "run --quiet --manifest-path scripts/policy-maintainer/Cargo.toml -- check-msrv-notice"
check-alloy-provider-invariant = "run --quiet --manifest-path scripts/policy-maintainer/Cargo.toml -- check-alloy-provider-invariant"
check-alloy-signer-invariant = "run --quiet --manifest-path scripts/policy-maintainer/Cargo.toml -- check-alloy-signer-invariant"
check-adr-coverage = "run --quiet --manifest-path scripts/policy-maintainer/Cargo.toml -- check-adr-coverage"
check-chain-patch-eligibility = "run --quiet --manifest-path scripts/policy-maintainer/Cargo.toml -- check-chain-patch-eligibility"
check-wasm-runner-freshness = "run --quiet --manifest-path scripts/policy-maintainer/Cargo.toml -- check-wasm-runner-freshness"
check-property-citations = "run --quiet --manifest-path scripts/policy-maintainer/Cargo.toml -- check-property-citations"
check-source-lock-roots = "run --quiet --manifest-path scripts/policy-maintainer/Cargo.toml -- check-source-lock-roots"
check-wasm-invariant = "run --quiet --manifest-path scripts/policy-maintainer/Cargo.toml -- check-wasm-invariant"
run-deterministic-examples = "run --quiet --manifest-path scripts/policy-maintainer/Cargo.toml -- run-deterministic-examples"

# Parity-maintainer subcommands.
parity-snapshot = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- snapshot"
parity-validate = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- validate"
parity-vendor-openapi = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- vendor-openapi"
parity-openapi-coverage = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- openapi-coverage"
parity-provision-upstreams = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- provision-upstreams"
parity-verify-sol-provenance = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- verify-sol-provenance"

# Validation-smoke subcommands.
registry-confirm = "run --quiet --manifest-path scripts/validation-smoke/Cargo.toml -- registry-confirm"
