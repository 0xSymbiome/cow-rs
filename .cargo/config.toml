run-deterministic-examples = "run --quiet --manifest-path scripts/policy-maintainer/Cargo.toml -- run-deterministic-examples"

# Parity-maintainer subcommands.
parity-snapshot = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- snapshot"
parity-validate = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- validate"
parity-vendor-openapi = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- vendor-openapi"
parity-openapi-coverage = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- openapi-coverage"
parity-diff-upstreams = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- diff-upstreams"
parity-check-freshness = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- check-freshness"
parity-provision-upstreams = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- provision-upstreams"
validate-producer-paths = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- validate-producer-paths"
validate-enum-policy = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- validate-enum-policy"
validate-principle-adr-map = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- validate-principle-adr-map"
check-deps = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- check-deps"
strategy-doc-lint = "run --quiet --manifest-path scripts/parity-maintainer/Cargo.toml -- strategy-doc-lint"
