[alias]
# Policy checks (xtask member).
check-policies = "run --quiet -p xtask -- policy all"
check-enum-policy = "run --quiet -p xtask -- policy check-enum-policy"
check-panic-allowlist = "run --quiet -p xtask -- policy check-panic-allowlist"
check-deny-unknown-fields = "run --quiet -p xtask -- policy check-deny-unknown-fields"
check-workspace-versions = "run --quiet -p xtask -- policy check-workspace-versions"
check-msrv-notice = "run --quiet -p xtask -- policy check-msrv-notice"
check-alloy-provider-invariant = "run --quiet -p xtask -- policy check-alloy-provider-invariant"
check-alloy-signer-invariant = "run --quiet -p xtask -- policy check-alloy-signer-invariant"
check-adr-coverage = "run --quiet -p xtask -- policy check-adr-coverage"
check-alloy-family-pins = "run --quiet -p xtask -- policy check-alloy-family-pins"
check-chain-patch-eligibility = "run --quiet -p xtask -- policy check-chain-patch-eligibility"
check-property-citations = "run --quiet -p xtask -- policy check-property-citations"
check-wasm-invariant = "run --quiet -p xtask -- policy check-wasm-invariant"
check-source-fences = "run --quiet -p xtask -- policy check-source-fences"
check-workflow-security = "run --quiet -p xtask -- policy check-workflow-security"
check-shell-wrappers = "run --quiet -p xtask -- policy check-shell-wrappers"
check-readme-include = "run --quiet -p xtask -- policy check-readme-include"
run-deterministic-examples = "run --quiet -p xtask -- policy run-deterministic-examples"

# Workspace maintenance tasks (xtask member).
xtask = "run --quiet -p xtask --"
docs-agree = "run --quiet -p xtask -- docs agree"
parity-validate = "run --quiet -p xtask -- parity validate"
parity-vendor-openapi = "run --quiet -p xtask -- parity vendor-openapi"
parity-openapi-coverage = "run --quiet -p xtask -- parity openapi-coverage"
registry-confirm = "run --quiet -p xtask -- parity confirm-deployments"
