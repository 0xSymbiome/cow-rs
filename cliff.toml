# git-cliff configuration — https://git-cliff.org/docs/configuration
#
# Generates CHANGELOG.md from the conventional-commit history (the
# `type(scope)!: subject` form this repo already uses). Invoked by
# cargo-release's pre-release hook (see release.toml) through the `cargo
# changelog` xtask, and runnable by hand:
#   cargo changelog                 # preview the pending section (stdout only)
#   cargo changelog --tag vX.Y.Z    # prepend a release section (keeps existing)
#   cargo changelog --tag vX.Y.Z --regenerate   # rebuild the whole file

[remote.github]
owner = "0xSymbiome"
repo = "cow-rs"

[changelog]
header = """
# Changelog

All notable changes to `cow-rs` will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.breaking %}[**breaking**] {% endif %}\
{% if commit.scope %}*({{ commit.scope }})* {% endif %}\
{{ commit.message | upper_first | split(pat="\n") | first }} \
([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/0xSymbiome/cow-rs/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = "<!-- generated by git-cliff -->\n"

[git]
conventional_commits = true
# Keep non-conventional commits visible under "Other" rather than dropping them,
# so nothing silently disappears from the record.
filter_unconventional = false
protect_breaking_commits = true
# Only user-facing change types reach the changelog; everything else is hidden.
# `protect_breaking_commits = true` (above) overrides `skip` for any breaking
# change (`!` / `BREAKING CHANGE`), so those always surface under their group —
# important while breaking changes are routine pre-1.0.
commit_parsers = [
    { message = "^Merge", skip = true },
    { message = "^[Ff]eat", group = "Features" },
    { message = "^[Ff]ix", group = "Bug Fixes" },
    { message = "^[Pp]erf", group = "Performance" },
    { message = "^[Dd]oc", group = "Documentation", skip = true },
    { message = "^[Rr]efactor", group = "Refactor", skip = true },
    { message = "^[Tt]est", group = "Testing", skip = true },
    { message = ".*\\b([Dd]eps|[Dd]ependencies|[Bb]ump)\\b", group = "Dependencies", skip = true },
    { message = "^[Cc]hore", group = "Miscellaneous Tasks", skip = true },
    { message = ".*", group = "Other", skip = true },
]
# Every release — including the `-alpha.N` pre-releases — gets its own dated
# section. Add `skip_tags = "alpha|beta"` (alloy's setting) later if you would
# rather fold pre-releases into the next stable section.
tag_pattern = "v[0-9]*"
sort_commits = "newest"