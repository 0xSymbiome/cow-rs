[package]
name = "cow-sdk-contracts"
version = "0.0.1-reserved.0"
edition = "2024"
rust-version = "1.94.0"
license = "GPL-3.0-only"
description = "Reserved placeholder for cow-sdk-contracts, the low-level contracts helpers for hashing, settlement encoding, and on-chain interaction plumbing of the CoW Protocol Rust SDK."
repository = "https://github.com/0xSymbiome/cow-rs"
homepage = "https://github.com/0xSymbiome/cow-rs"
documentation = "https://docs.rs/cow-sdk-contracts"
readme = "README.md"
keywords = ["cow-protocol", "contracts", "ethereum", "hashing"]
categories = ["api-bindings", "cryptography::cryptocurrencies"]

[package.metadata.docs.rs]
all-features = true

[lib]
path = "src/lib.rs"
