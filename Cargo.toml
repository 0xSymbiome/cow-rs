[workspace]
members = [
  "crates/core",
  "crates/contracts",
  "crates/signing",
  "crates/app-data",
  "crates/orderbook",
  "crates/trading",
  "crates/subgraph",
  "crates/browser-wallet",
  "crates/sdk",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "GPL-3.0"
repository = "https://github.com/cowdao-grants/cow-rs"
rust-version = "1.94"
version = "0.1.0"

[workspace.lints.rust]
rust_2018_idioms = { level = "deny", priority = -1 }
unsafe_code = "deny"
unused_must_use = "deny"

[workspace.lints.rustdoc]
all = "warn"
broken_intra_doc_links = "deny"

[workspace.dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
hex = "0.4.3"
jsonschema = { version = "0.45.1", default-features = false }
multibase = "0.9.2"
num-bigint = "0.4.6"
reqwest = { version = "0.13.2", default-features = false }
sha3 = "0.11.0"
tokio = { version = "1.51.1", default-features = false }
