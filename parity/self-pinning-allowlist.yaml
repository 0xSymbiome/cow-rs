# Self-pinning allowlist for parity/fixtures/**/*.json
#
# Every entry below is a fixture that the parity-maintainer audit-self-pinning
# gate (`cargo parity-audit-self-pinning`) would otherwise reject. Each entry
# carries a documented justification or defer_reason, an explicit review_trigger
# naming the future event under which the entry is re-evaluated, and (where
# applicable) an upgrade_to plan describing the structured authority block the
# fixture is targeted to land.
#
# Re-evaluating an entry means one of:
#   1. Upgrading the fixture to a permit class (a structured `expected_from:`
#      block, an `@source_ref:` citation, or a clear pure-input shape) and
#      removing the entry from this allowlist.
#   2. Re-affirming the entry with an updated review_trigger.
#
# This file is read by `cargo parity-audit-self-pinning` on every CI run.
# The full authority hierarchy is documented in
# docs/adr/0012-alloy-sol-bindings-and-registry-authority.md.

schema_version: 1

grandfathered:
  - path: parity/fixtures/ecdsa/v_normalization.json
    class: RustSelfPin
    justification: |
      ECDSA v normalization is a deterministic four-input mapping
      (0 -> 27, 1 -> 28, 27 -> 27, 28 -> 28) backed by EIP-2098 and EIP-155
      canonical-v semantics per ADR 0022. The mapping has no equivalent
      Solidity authority outside the spec documents; it is a wire-encoding
      convention exercised by unit tests in crates/contracts/src/signature.rs.
    upgrade_to: |
      Replace the top-level source annotation with an expected_from array
      citing EIP-2098 (Compact Signature Format), EIP-155 (Signature
      Encoding), and ADR-0022 (Canonical v). Once upgraded, remove this
      entry from the allowlist.
    review_trigger: ADR 0022 amendment, or upgrade to expected_from shape per upgrade_to

  - path: parity/fixtures/composable/forwarder_signature_blob.json
    class: FreeFormProse
    defer_reason: composable-out-of-scope
    review_trigger: composable crate landing in cow-rs

  - path: parity/fixtures/composable/multiplexer_leaf.json
    class: FreeFormProse
    defer_reason: composable-out-of-scope
    review_trigger: composable crate landing in cow-rs

  - path: parity/fixtures/composable/params_hash.json
    class: FreeFormProse
    defer_reason: composable-out-of-scope
    review_trigger: composable crate landing in cow-rs

  - path: parity/fixtures/composable/safe_muxer_signature_blob.json
    class: FreeFormProse
    defer_reason: composable-out-of-scope
    review_trigger: composable crate landing in cow-rs

  - path: parity/fixtures/composable/selectors.json
    class: Missing
    defer_reason: composable-out-of-scope
    review_trigger: composable crate landing in cow-rs

  - path: parity/fixtures/composable/poll_result_selectors.json
    class: Missing
    defer_reason: composable-out-of-scope
    review_trigger: composable crate landing in cow-rs

  - path: parity/fixtures/composable/poll_result_classification.json
    class: Missing
    defer_reason: composable-out-of-scope
