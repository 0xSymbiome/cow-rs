  - path: parity/fixtures/cow_shed/proxy_addresses.json
    class: FreeFormProse
    justification: |
      The COW Shed proxy address derives from the CREATE2 formula applied to
      the COW Shed factory. The Solidity source is pinned via
      parity/source-lock.yaml under cow-shed at the documented commit; this
      fixture documents the formula application. Future expansion will move
      the attribution to an expected_from array citing the COW Shed Solidity
      source by file and line.
    upgrade_to: |
      Replace the top-level source annotation with an expected_from array
      that includes a solidity-source entry citing the cow-shed factory
      source by repository, commit, path, and symbol.
    review_trigger: COW Shed surface refresh, or upgrade to expected_from shape per upgrade_to

# Entries below are expectation-bearing fixtures targeted for upgrade in the
# same change set that lands the audit-self-pinning gate in blocking mode.
# After their `expected_from:` blocks land, these entries are removed and the
# `in_flight_upgrade:` block becomes empty (or is deleted entirely).
in_flight_upgrade:
  - path: parity/fixtures/cow_shed/execute_hooks_digest.json
    class: Missing
    upgrade_to: |
      Add an expected_from array citing the COW Shed Solidity source at
      src/COWShed.sol#hashHooks (by repo, commit, path, symbol) and the
      EIP-712 spec for typedDataHash.
    review_trigger: this change set (the audit gate flips to blocking once the upgrade lands)

  - path: parity/fixtures/cow_shed/execute_hooks_calldata.json
    class: Missing
    upgrade_to: |
      Add an expected_from array citing the COW Shed Solidity source at
      src/COWShed.sol#executeHooks and the Solidity ABI specification for
      the encoding contract.
    review_trigger: this change set

  - path: parity/fixtures/cow_shed/domain_separator.json
    class: Missing
    upgrade_to: |
      Add an expected_from array citing the COW Shed Solidity source at
      src/COWShed.sol#domainSeparator and EIP-712 for the domain-separator
      computation.
    review_trigger: this change set

  - path: parity/fixtures/cow_shed/eoa_signature_byte_order.json
    class: Missing
    upgrade_to: |
      Add an expected_from array citing EIP-2098 (Compact Signature Format)
      and ADR-0022 (Canonical v) as the protocol-law authorities for the
      compact signature byte order.
    review_trigger: this change set
