[package]
name = "policy-maintainer"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
license = "GPL-3.0-only"
publish = false

[[bin]]
name = "policy-maintainer"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
anyhow = "1.0.102"
chrono = { version = "0.4.44", default-features = false, features = ["clock", "std"] }
clap = { version = "4.6.1", features = ["derive", "env"] }
proc-macro2 = "1.0.106"
semver = "1.0.28"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_norway = "0.9.42"
syn = { version = "2.0.117", features = ["full", "extra-traits", "visit"] }
thiserror = "2.0.18"

[workspace]
