[package]
name = "parity-maintainer"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
publish = false

[dependencies]
anyhow = "1.0.100"
chrono = { version = "0.4.42", default-features = false, features = ["clock", "serde", "std"] }
clap = { version = "4.5.50", features = ["derive"] }
regex = { version = "1.11.3", default-features = false, features = ["std", "perf", "unicode-perl"] }
reqwest = { version = "0.12.24", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_yaml = "0.9.34"
syn = { version = "2.0.108", features = ["full"] }

[dev-dependencies]
tempfile = "3.23.0"

[workspace]
