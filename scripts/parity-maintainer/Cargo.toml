[package]
name = "parity-maintainer"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
publish = false

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.50", features = ["derive"] }
reqwest = { version = "0.12.24", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_norway = "0.9.42"
syn = { version = "2.0.108", features = ["full"] }

[dev-dependencies]
tempfile = "3.23.0"

[workspace]
