[package]
name = "validation-depth"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
publish = false

[dependencies]
clap = { version = "4.6.0", features = ["derive", "env"] }
reqwest = { version = "0.13.2", default-features = false, features = ["blocking", "json", "rustls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
urlencoding = "2.1.3"
zip = { version = "8.5.1", default-features = false, features = ["deflate"] }

[workspace]
