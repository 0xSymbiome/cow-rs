jobs:
  deny:
    steps:
      - name: Check RustSec advisories
        run: |
          cargo audit --deny unsound --deny unmaintained \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2024-0388 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2026-0105
  alloy-provider-invariant:
    steps:
      - name: Assert no shipped leaf crate depends on alloy-provider
        run: |
          output="$(cargo tree --invert alloy-provider \
            -p cow-sdk-core \
            -p cow-sdk-contracts \
            -p cow-sdk-signing \
            -p cow-sdk-orderbook \
            -p cow-sdk-subgraph \
            -p cow-sdk-app-data \
            -p cow-sdk-trading \
            -p cow-sdk-browser-wallet \
            -p cow-sdk 2>&1 || true)"
