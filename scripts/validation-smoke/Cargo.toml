[package]
name = "validation-smoke"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
publish = false

[dependencies]
anyhow = "1.0.102"
chrono = { version = "0.4.44", default-features = false, features = ["clock", "std"] }
clap = { version = "4.5.51", features = ["derive", "env"] }
hex = "0.4.3"
reqwest = { version = "0.13.2", default-features = false, features = ["blocking", "json", "rustls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_norway = "0.9.42"
sha2 = "0.10.9"
sha3 = "0.11.0"
zip = { version = "8.5.1", default-features = false, features = ["deflate"] }

[[bin]]
name = "validation-smoke"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dev-dependencies]
tempfile = "3.23.0"

[workspace]
