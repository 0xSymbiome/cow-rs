schema {
  query: Query
}

type Query {
  totals: [Totals!]!
  dailyTotals(
    orderBy: DailyTotal_orderBy
    orderDirection: OrderDirection
    first: Int
  ): [DailyTotal!]!
  hourlyTotals(
    orderBy: HourlyTotal_orderBy
    orderDirection: OrderDirection
    first: Int
  ): [HourlyTotal!]!
}

type Totals {
  tokens: String!
  orders: String!
  traders: String!
  settlements: String!
  volumeUsd: String
  volumeEth: String
  feesUsd: String
  feesEth: String
}

type DailyTotal {
  timestamp: Int!
  volumeUsd: String
}

type HourlyTotal {
  timestamp: Int!
  volumeUsd: String
}

enum OrderDirection {
  asc
  desc
}

enum DailyTotal_orderBy {
  timestamp
  volumeUsd
}

enum HourlyTotal_orderBy {
  timestamp
  volumeUsd
}
