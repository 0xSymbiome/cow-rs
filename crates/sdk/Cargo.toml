[package]
name = "cow-sdk"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

description = "Facade crate for CoW Protocol Rust SDK surfaces"
readme = "../../README.md"
documentation = "https://docs.rs/cow-sdk"
homepage = "https://github.com/cowdao-grants/cow-rs"
keywords = ["cow-protocol", "sdk", "defi", "trading"]
categories = ["api-bindings", "cryptography::cryptocurrencies"]

[lib]
path = "src/lib.rs"

[features]
default = []
browser-wallet = ["dep:cow-sdk-browser-wallet"]

[dependencies]
cow-sdk-app-data = { path = "../app-data", version = "0.1.0" }
cow-sdk-browser-wallet = { path = "../browser-wallet", version = "0.1.0", optional = true }
cow-sdk-contracts = { path = "../contracts", version = "0.1.0" }
cow-sdk-orderbook = { path = "../orderbook", version = "0.1.0" }
cow-sdk-signing = { path = "../signing", version = "0.1.0" }
cow-sdk-trading = { path = "../trading", version = "0.1.0" }
cow-sdk-core = { path = "../core", version = "0.1.0" }
thiserror.workspace = true
