[package]
name = "cow-sdk-contracts"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

description = "CoW Protocol low-level contracts helpers for hashing, settlement encoding, and on-chain interaction plumbing"
readme = "README.md"
documentation = "https://docs.rs/cow-sdk-contracts"
homepage = "https://github.com/cowdao-grants/cow-rs"
keywords = ["cow-protocol", "sdk", "contracts", "ethereum", "hashing"]
categories = ["api-bindings", "cryptography::cryptocurrencies"]

[package.metadata.docs.rs]
default-target = "x86_64-unknown-linux-gnu"
targets = ["x86_64-unknown-linux-gnu", "wasm32-unknown-unknown"]

[lints]
workspace = true

[features]
default = []
tracing = ["dep:tracing"]

[dependencies]
bytes.workspace = true
cow-sdk-core = { path = "../core", version = "0.1.0" }
hex.workspace = true
num-bigint.workspace = true
serde.workspace = true
serde_json.workspace = true
sha3.workspace = true
thiserror.workspace = true
tracing = { workspace = true, optional = true }

[dev-dependencies]
criterion.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[[bench]]
name = "order_hashing"
harness = false

[[bench]]
name = "uid_packing"
harness = false
