# CoW Protocol chain-keyed deployed-contract registry.
#
# The manifest is the single source of truth for the canonical deployed
# addresses this crate exposes through `cow_sdk_contracts::deployments::Registry`.
# Every row pairs a logical contract identifier with a supported chain id and
# a deployment environment; the address is the 20-byte Ethereum account
# that contract lives at on that chain.
#
# Invariants enforced by `build.rs` at compile time:
#
#   * schema_version must be the reviewed shape version (currently 1).
#   * contract_id must be one of the canonical variants (Settlement,
#     VaultRelayer, EthFlow).
#   * chain_id must appear in the supported chain set shared with
#     `src/chain_ids.rs` (the eleven supported chains).
#   * env must be "prod" or "staging".
#   * address must be 0x-prefixed 40-character (20-byte) hex.
#   * each (contract_id, chain_id, env) tuple must be unique.
#
# Initial rows seed every chain within a given (contract_id, env) pair to
# the canonical mainnet-style address because the protocol publishes a
# single deployment per environment today. Per-chain address divergence
# will land as additive manifest edits without any call-site changes.

schema_version = 1

