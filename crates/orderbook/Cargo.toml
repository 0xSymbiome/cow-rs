[package]
name = "cow-sdk-orderbook"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

description = "Typed CoW Protocol orderbook client models and decoding helpers"
readme = "../../README.md"
documentation = "https://docs.rs/cow-sdk-orderbook"
homepage = "https://github.com/cowdao-grants/cow-rs"
keywords = ["cow-protocol", "orderbook", "api", "trading"]
categories = ["api-bindings", "cryptography::cryptocurrencies"]

[dependencies]
cow-sdk-core = { path = "../core", version = "0.1.0" }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
thiserror.workspace = true
futures-timer = "3.0.3"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
reqwest = { workspace = true, features = ["json", "query", "rustls"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
reqwest = { workspace = true, features = ["json", "query"] }
web-time = "1.1.0"
gloo-timers = { version = "0.4.0", features = ["futures"] }

[dev-dependencies]
serde_json.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
wiremock = "0.6.5"
