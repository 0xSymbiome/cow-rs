---
# Primary and supporting ADR coverage for cow-rs principles.
# Every principle has exactly one primary ADR. Supporting ADRs are optional.
# Every accepted ADR is referenced under at least one principle or listed in
# out_of_scope_adrs with a written rationale.
#
# ADRs 0030-0033 are accepted and covered by the blocking ADR coverage lane.
#
# Doctrines: `docs/alloy-doctrine.md` is the canonical human-readable
# consolidation of the ADRs listed under principles 8 (Chain-RPC Runtime
# Neutrality) and 9 (Canonical Contract Bindings). The doctrine is
# read-only over the ADR set; it does not introduce policy. Doctrine
# evolution requires an ADR amendment plus a refresh of this map's
# supporting_adrs lists.

version: 1

principles:
  - id: 1
    name: Deterministic Protocol Transforms
    primary_adr: "0012"
    supporting_adrs: ["0011", "0022", "0052"]

  - id: 2
    name: Explicit Runtime Boundaries
    primary_adr: "0010"
    supporting_adrs: ["0055"]

  - id: 3
    name: Thin Facade, Real Crate Boundaries
