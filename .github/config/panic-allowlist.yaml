version: 1
allowed:
  - file: crates/app-data/src/schema.rs
    item: generate_app_data_doc
    reason: Typed metadata serialization is guaranteed by the public constructors feeding this path.
  - file: crates/app-data/src/schema.rs
    item: root_schemas
    reason: Embedded schema resource URIs are constructed from the static SCHEMA_BASE_URI prefix.
  - file: crates/app-data/src/schema.rs
    item: collect_files
    reason: include_dir! embedded directories always have file names.
  - file: crates/app-data/src/schema.rs
    item: collect_file
    reason: include_dir! embedded files have names and committed schema JSON is validated at build and test time.
  - file: crates/app-data/src/types/partner_fee.rs
    item: PartnerFee::to_value
    reason: Partner fee schema enums serialize through derived serde for SDK-owned values.
  - file: crates/browser-wallet/src/mock.rs
    item: MockState::default
    reason: Static mock account literals are repository-owned validated EVM addresses.
  - file: crates/browser-wallet/src/wallet/chain.rs
    item: WalletChainParameters::for_supported_chain
    reason: Built-in chain metadata is static and shares the same validator as user-supplied metadata.
  - file: crates/browser-wallet/src/wallet/mod.rs
    item: BrowserWallet::from_transport_or_panic
    reason: Panic-named constructor is documented as panic-on-invalid for explicitly trusted Rust transports.
  - file: crates/browser-wallet/src/wallet/chain.rs
    item: known_wallet_native_currency
    reason: Built-in native-currency metadata is static and validated by construction.
  - file: crates/contracts/src/deploy.rs
    item: deployment_for_chain
    reason: The embedded registry is compile-time validated to include canonical contracts for every supported chain.
  - file: crates/contracts/src/deployments/chain_id.rs
    item: DeploymentChainId::from
    reason: SupportedChainId is the only producer and the bridge match is exhaustive across the currently supported chains; non-exhaustive future variants must land in the same patch with an explicit policy review.
  - file: crates/contracts/src/deployments/coverage.rs
    item: DeploymentCoverage::default
    reason: The embedded deployment-coverage manifest is validated by build.rs before runtime use.
  - file: crates/contracts/src/deployments/env.rs
    item: DeploymentEnv::from
    reason: CowEnv is the only producer and the bridge match is exhaustive across the currently supported environments; non-exhaustive future variants must land in the same patch with an explicit policy review.
  - file: crates/contracts/src/deployments/registry.rs
    item: Registry::default
    reason: The embedded registry manifest is validated by build.rs before runtime use.
  - file: crates/contracts/src/primitives.rs
    item: sell_balance_name
    reason: In-crate balance mapping covers every currently representable settlement sell-balance variant.
  - file: crates/contracts/src/primitives.rs
    item: buy_balance_name
    reason: In-crate balance mapping covers every currently representable settlement buy-balance variant.
  - file: crates/contracts/src/settlement/codec.rs
    item: encode_order_flags
    reason: Flag encoding masks only the currently supported typed balance variants.
  - file: crates/contracts/src/settlement/codec.rs
    item: decode_order_flags
    reason: Bit masks are constrained before reaching unreachable arms.
  - file: crates/core/src/redaction/body.rs
    item: strip_credential_tokens
    reason: Redaction offsets are computed from in-bounds string match indices.
  - file: crates/core/src/types/identity.rs
    item: AppDataHash::to_cid
    reason: AppDataHash is #[repr(transparent)] over alloy_primitives::B256 — its byte slice is always exactly 32 bytes, strictly less than the 64-byte capacity of Multihash<64>. The Multihash::wrap call is statically infallible by the type invariant; the .expect documents the unreachability inline. The companion expect on Cid::to_string_of_base(Base16Lower) is statically infallible because Base16Lower is the cow-protocol canonical multibase and is always supported by the cid crate. Both call sites carry inline SAFETY comments naming the invariant.
  - file: crates/contracts/src/order/uid.rs
    item: extract_order_uid_params
    reason: The two slice-to-array conversions in extract_order_uid_params operate on slices whose length is guaranteed by the ORDER_UID_LENGTH guard at the top of the function (bytes.len() == 56); the try_into-to-[u8; 32] and try_into-to-[u8; 20] conversions cannot fail under that guard, and the expect calls document the unreachability proof inline through // SAFETY comments naming the guarantee.
  - file: crates/contracts/src/signature.rs
    item: decode_eip1271_signature_data
    reason: The slice-to-array conversion in decode_eip1271_signature_data operates on a slice whose length is guaranteed by the bytes.len() < 20 early-return guard above; the try_into-to-[u8; 20] conversion cannot fail under that guard, and the expect call documents the unreachability proof inline through a // SAFETY comment naming the guarantee.
  - file: crates/orderbook/src/request.rs
    item: ResponseEnvelope::json
    reason: Test-only response envelope helper serializes serde_json::Value fixtures.
  - file: crates/orderbook/src/transform.rs
    item: native_token_address
    reason: Native token sentinel literal is static and validated by the Address constructor.
  - file: crates/orderbook/src/types/enums.rs
    item: SigningScheme::from
    reason: The variant-by-variant SigningScheme bridge parity test prevents drift; any new cow-sdk-contracts SigningScheme variant must land in the same patch.
  - file: crates/signing/src/domain.rs
    item: get_domain
    reason: Canonical settlement address is guaranteed by the validated deployment registry.
  - file: crates/trading/src/allowance.rs
    item: resolve_vault_relayer
    reason: Canonical vault-relayer address is guaranteed by the validated deployment registry.
  - file: crates/trading/src/onchain.rs
