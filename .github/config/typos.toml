[files]
extend-exclude = [
  ".git",
  "target",
  "examples/wasm/**/pkg",
  "Cargo.toml",
  "Cargo.lock",
  "*.json",
  "crates/contracts/abi/**",
  "fuzz/corpus/**",
]

[default]
extend-ignore-re = [
  "(?i)0x[0-9a-f]{8}",
  "(?i)0x[0-9a-f]{40}",
  "(?i)0x[0-9a-f]{64}",
  "(?i)[0-9a-f]{8}",
  "(?i)[0-9a-f]{40}",
  "(?i)[0-9a-f]{64}",
  "[0-9]+nd",
  "[0-9]+rd",
  "[0-9]+st",
  "[0-9]+th",
]

[default.extend-words]
BA = "BA"
bimap = "bimap"
propert = "propert"
ser = "ser"
typ = "typ"
