[advisories]
version = 2
yanked = "warn"

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Duplicate-version maintenance is curated here with explicit subtree scope and reasons.
skip-tree = [
  { name = "ethabi", version = "=18.0.0", reason = "Browser-wallet ABI decoding still depends on the rust-ethereum stack, which currently carries the 0.10 crypto split and rand 0.8 through ethereum-types." },
  { name = "graphql_client", version = "=0.16.0", reason = "Subgraph schema/codegen evidence is test-only and still depends on the graphql-parser/thiserror 1.x stack." },
  { name = "rustls-platform-verifier", version = "=0.6.2", reason = "The current native reqwest trust-store path still carries a legacy platform-specific verifier subtree." },
]

[licenses]
version = 2
confidence-threshold = 0.8
private = { ignore = true }
unused-allowed-license = "warn"

allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "GPL-3.0-only",
  "LicenseRef-rustls-webpki",
  "MIT",
  "MIT-0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

exceptions = [
  { allow = ["CC0-1.0"], name = "tiny-keccak" },
]

[[licenses.clarify]]
name = "rustls-webpki"
version = "*"
expression = "LicenseRef-rustls-webpki"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
