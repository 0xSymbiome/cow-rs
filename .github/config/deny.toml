[advisories]
version = 2
yanked = "warn"
# Reviewed exceptions are mirrored from the public audit artifacts under
# docs/audit/ and share a 90-day re-review rhythm. Each entry names its
# owning audit so drift is reviewable in one place.
ignore = [
  { id = "RUSTSEC-2026-0097", reason = "Only reachable through the published cid 0.11.1 -> core2 0.4.0 chain; tracked in docs/audit/cid-dependency-audit.md with a 90-day re-review floor." },
  { id = "RUSTSEC-2024-0388", reason = "Unmaintained `derivative` is reachable only through the alloy-primitives -> ruint -> ark-ff proc-macro subtree and does not compile runtime code; tracked in docs/audit/browser-wallet-alloy-dependency-audit.md with a 90-day re-review floor." },
  { id = "RUSTSEC-2024-0436", reason = "Unmaintained `paste` is reachable only through the alloy-sol-macro and alloy-primitives proc-macro subtrees and does not compile runtime code; tracked in docs/audit/browser-wallet-alloy-dependency-audit.md with a 90-day re-review floor." },
  { id = "RUSTSEC-2026-0105", reason = "Unmaintained and yanked `core2` is reachable only through the published cid 0.11.1 -> core2 0.4.0 chain; tracked in docs/audit/cid-dependency-audit.md with a 90-day re-review floor." },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Duplicate-version maintenance is curated here with explicit subtree scope and reasons.
skip-tree = [
  { name = "alloy-primitives", version = "=1.5.7", reason = "The alloy 1.x ABI helper family used by the browser-wallet contract-call bridge still carries the crypto-common 0.1 / digest 0.10 / block-buffer 0.10 / sha3 0.10 / keccak 0.1 / cpufeatures 0.2 subtree internally; first-party workspace pins use the matching 0.11 / 0.12 / 0.2 / 0.3 family. Tracked in docs/audit/browser-wallet-alloy-dependency-audit.md." },
  { name = "graphql_client", version = "=0.16.0", reason = "Subgraph schema/codegen evidence is test-only and still depends on the graphql-parser/thiserror 1.x stack." },
  { name = "rustls-platform-verifier", version = "=0.6.2", reason = "The current native reqwest trust-store path still carries a legacy platform-specific verifier subtree." },
  { name = "sha2", version = "=0.10.9", reason = "cow-sdk-app-data uses sha2 0.10.9 for the legacy CIDv0 sha2-256 digest path; that dependency still carries the digest 0.10 / block-buffer 0.10 / crypto-common 0.1 family, which coexists with the sha3 0.11-family tree used by the deterministic first-party hashing path." },
]

[licenses]
version = 2
confidence-threshold = 0.8
private = { ignore = true }
unused-allowed-license = "warn"

allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "GPL-3.0-only",
  "LicenseRef-rustls-webpki",
  "MIT",
  "MIT-0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

exceptions = [
  { allow = ["CC0-1.0"], name = "tiny-keccak" },
]

[[licenses.clarify]]
name = "rustls-webpki"
version = "*"
expression = "LicenseRef-rustls-webpki"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
