name: Upstream services drift report
description: >
  Automatically opened by the services-drift workflow when newly-detected
  divergence appears between the upstream CoW services repository and the
  typed cow-rs counterparts.
title: '[services-drift] Newly-detected upstream divergence'
labels: [services-drift]
body:
  - type: markdown
    attributes:
      value: |
        The services-drift workflow detected divergence between the upstream
        services repository and the typed cow-rs counterparts. Review the diff
        below and decide whether to promote the upstream change to a typed
        variant or DTO field, leave the `OrderbookRejection::Unknown` fallback
        in place, or coordinate with upstream.
  - type: textarea
    id: drift-report
    attributes:
      label: Drift report
      description: Output of the most recent run.
      placeholder: |
        Paste the workflow-summary report from the services-drift workflow run here.
    validations:
      required: true
  - type: input
    id: workflow-run-url
    attributes:
      label: Workflow run URL
      description: Link to the workflow run that detected the drift.
    validations:
      required: true
