name: wasm-example-pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - feat/**

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: actions/configure-pages@v5
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: wasm32-unknown-unknown
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked

      - name: Build sdk verification console
        working-directory: examples/wasm/sdk-verification-console
        run: wasm-pack build --target web

      - name: Build browser wallet console
        working-directory: examples/wasm/browser-wallet-console
        run: wasm-pack build --target web

      - name: Assemble static Pages artifact
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/sdk-verification-console dist/browser-wallet-console
          cp examples/wasm/index.html dist/index.html
          cp examples/wasm/sdk-verification-console/index.html dist/sdk-verification-console/index.html
          cp -R examples/wasm/sdk-verification-console/pkg dist/sdk-verification-console/pkg
          cp examples/wasm/browser-wallet-console/index.html dist/browser-wallet-console/index.html
          cp -R examples/wasm/browser-wallet-console/pkg dist/browser-wallet-console/pkg
          touch dist/.nojekyll

      # Source ref: actions/upload-pages-artifact@v4
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Source ref: actions/deploy-pages@v4
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
