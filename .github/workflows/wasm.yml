name: wasm

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.cargo/**'
      - '.github/config/**'
      - '.github/workflows/wasm.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/**'
      - 'e2e/wasm-typescript/**'
      - 'e2e/wasm-typescript-cf/**'
      - 'e2e/wasm-typescript-deno/**'
      - 'rust-toolchain.toml'
      - 'scripts/policy-maintainer/**'
      - 'tests/**'
  push:
    branches:
      - main
      - develop
      - feat/**
    paths:
      - '.cargo/**'
      - '.github/config/**'
      - '.github/workflows/wasm.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/**'
      - 'e2e/wasm-typescript/**'
      - 'e2e/wasm-typescript-cf/**'
      - 'e2e/wasm-typescript-deno/**'
      - 'rust-toolchain.toml'
      - 'scripts/policy-maintainer/**'
      - 'tests/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  CARGO_TERM_COLOR: always
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.0'

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: wasm32-unknown-unknown
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install Binaryen
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binaryen
          wasm-opt --version
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Check cow-sdk-wasm host gate
        run: cargo check -p cow-sdk-wasm --no-default-features
      - name: Check cow-sdk-wasm wasm32
        run: cargo check -p cow-sdk-wasm --target wasm32-unknown-unknown --no-default-features
      - name: Test host pure helpers
        run: cargo test -p cow-sdk-wasm --test host_pure_helpers
      - name: Test app-data fetch contract
        run: cargo test -p cow-sdk-app-data --test fetch_contract
      - name: Test wasm dependency invariant
        run: cargo test -p cow-rs-workspace-tests --test wasm_dependency_invariant
      - name: Run policy-maintainer wasm invariant
        run: cargo check-wasm-invariant
      - name: Run workspace clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Run workspace tests
        run: cargo test --workspace --all-features

  wasm-pack-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - rust-checks
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: wasm32-unknown-unknown
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install Binaryen
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binaryen
          wasm-opt --version
      # Source ref: actions/setup-node@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked
      - name: Build npm staging tree
        run: bash crates/wasm/npm/scripts/build.sh
      - name: Check default wasm raw size budget
        run: |
          wasm_path="crates/wasm/npm/dist/web/cow_sdk_wasm_bg.wasm"
          budget=$((4 * 1024 * 1024))
          size=$(wc -c < "$wasm_path")
          awk -v path="$wasm_path" -v size="$size" 'BEGIN { printf "%s: %.2f MiB raw\n", path, size / 1024 / 1024 }'
          if [ "$size" -gt "$budget" ]; then
            echo "default wasm raw size ${size} exceeds 4 MiB budget" >&2
            exit 1
          fi
      - name: Check TypeScript declaration snapshots
        run: |
          diff -u crates/wasm/snapshots/raw/cow_sdk_wasm_web.d.ts crates/wasm/npm/dist/web/cow_sdk_wasm.d.ts
          diff -u crates/wasm/snapshots/raw/cow_sdk_wasm_bundler.d.ts crates/wasm/npm/dist/bundler/cow_sdk_wasm.d.ts
          diff -u crates/wasm/snapshots/raw/cow_sdk_wasm_nodejs.d.ts crates/wasm/npm/dist/nodejs/cow_sdk_wasm.d.ts
      # Source ref: actions/upload-artifact@v4
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cow-sdk-wasm-npm
          path: crates/wasm/npm/
          if-no-files-found: error

  wasm-bindgen-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - rust-checks
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: wasm32-unknown-unknown
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install Binaryen
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binaryen
          wasm-opt --version
      # Source ref: actions/setup-node@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked
      - name: Set up pinned WASM browser runner
        env:
          WEBDRIVER_JSON: ${{ runner.temp }}/webdriver.json
        run: cargo wasm-runner-setup --webdriver-json "$WEBDRIVER_JSON"
      - name: Export pinned WASM browser runner paths
        env:
          WEBDRIVER_JSON: ${{ runner.temp }}/webdriver.json
        run: |
          node - <<'JS' >> "$GITHUB_ENV"
          const fs = require("node:fs");
          const webdriver = JSON.parse(fs.readFileSync(process.env.WEBDRIVER_JSON, "utf8"));
          console.log(`WASM_BINDGEN_TEST_WEBDRIVER_JSON=${process.env.WEBDRIVER_JSON}`);
          console.log(`WASM_BINDGEN_TEST_CHROMEDRIVER=${webdriver["cow:wasmRunner"].chromedriver}`);
          JS
      - name: Test cow-sdk-wasm in headless Chrome
        run: wasm-pack test --headless --chrome --chromedriver "$WASM_BINDGEN_TEST_CHROMEDRIVER" crates/wasm

  vitest-nodejs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - wasm-pack-build
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: actions/download-artifact@v6
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: cow-sdk-wasm-npm
          path: crates/wasm/npm
      # Source ref: actions/setup-node@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
      # Source ref: pnpm/action-setup@v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Install TypeScript fixture dependencies
        run: pnpm --dir e2e/wasm-typescript install --frozen-lockfile
      - name: Run Node Vitest
        run: pnpm --dir e2e/wasm-typescript run test:vitest

  playwright-bundler:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - wasm-pack-build
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: actions/download-artifact@v6
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: cow-sdk-wasm-npm
          path: crates/wasm/npm
      # Source ref: actions/setup-node@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
      # Source ref: pnpm/action-setup@v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Install TypeScript fixture dependencies
        run: pnpm --dir e2e/wasm-typescript install --frozen-lockfile
      - name: Install Chromium
        run: pnpm --dir e2e/wasm-typescript exec playwright install --with-deps chromium
      - name: Run Playwright bundler tests
        run: pnpm --dir e2e/wasm-typescript run test:playwright

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - wasm-pack-build
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: actions/download-artifact@v6
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: cow-sdk-wasm-npm
          path: crates/wasm/npm
      # Source ref: actions/setup-node@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
      # Source ref: pnpm/action-setup@v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Install TypeScript fixture dependencies
        run: pnpm --dir e2e/wasm-typescript install --frozen-lockfile
      - name: Type-check TypeScript fixture
        run: pnpm --dir e2e/wasm-typescript run test:type-check

  workers-vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - wasm-pack-build
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: actions/download-artifact@v6
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: cow-sdk-wasm-npm
          path: crates/wasm/npm
      # Source ref: actions/setup-node@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
      # Source ref: pnpm/action-setup@v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Install Workers fixture dependencies
        run: pnpm --dir e2e/wasm-typescript-cf install --frozen-lockfile
      - name: Run Workers Vitest
        run: pnpm --dir e2e/wasm-typescript-cf run test

  deno-test:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(join(github.event.pull_request.labels.*.name, ','), 'wasm-deno')) || contains(github.event.head_commit.message, '[wasm-deno]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - wasm-pack-build
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: wasm32-unknown-unknown
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      # Source ref: actions/setup-node@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Binaryen
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binaryen
          wasm-opt --version
      # Source ref: denoland/setup-deno@v2.0.4
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked
      - name: Build Deno package target
        env:
          BUILD_DENO: '1'
        run: bash crates/wasm/npm/scripts/build.sh
      - name: Run Deno tests
        env:
          BUILD_DENO: '1'
        run: deno task --config e2e/wasm-typescript-deno/deno.jsonc test

  npm-tarball-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - wasm-pack-build
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: actions/download-artifact@v6
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: cow-sdk-wasm-npm
          path: crates/wasm/npm
      # Source ref: actions/setup-node@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Verify export targets
        run: node crates/wasm/npm/scripts/verify-exports.mjs
      - name: Verify package subpath resolution
        run: bash crates/wasm/npm/scripts/verify-package-resolution.sh
      - name: Verify publish guard override
        env:
          ALLOW_PLACEHOLDER_NPM_PUBLISH: '1'
        run: bash crates/wasm/npm/scripts/prepublish-guard.sh

  wasm-success:
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    needs:
      - rust-checks
      - wasm-pack-build
      - wasm-bindgen-tests
      - vitest-nodejs
      - playwright-bundler
      - type-check
      - workers-vitest
      - deno-test
      - npm-tarball-verify
    steps:
      # Source ref: re-actors/alls-green@release/v1
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: deno-test
