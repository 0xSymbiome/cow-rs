      - playwright-bundler
      - type-check
      - workers-vitest
      - example-node-viem
      - example-browser-mm
      - example-cloudflare-proxy
      - npm-tarball-verify
    steps:
      # Source ref: re-actors/alls-green@release/v1
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe
        with:
          jobs: ${{ toJSON(needs) }}
