name: wasm-compatibility

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.cargo/**'
      - '.github/config/**'
      - '.github/workflows/wasm.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/**'
      - 'examples/wasm/**'
      - 'rust-toolchain.toml'
  push:
    branches:
      - main
      - develop
      - feat/**
    paths:
      - '.cargo/**'
      - '.github/config/**'
      - '.github/workflows/wasm.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/**'
      - 'examples/wasm/**'
      - 'rust-toolchain.toml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: wasm32-unknown-unknown
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Verify inner-workspace WASM pins match workspace pins
        shell: bash
        run: |
          set -euo pipefail
          extract_pin() {
            local manifest="$1"
            local dependency="$2"
            (grep -E "^${dependency}[[:space:]]*=" "$manifest" || true) | \
              sed -nE 's/^[^=]+=[[:space:]]*(\{[[:space:]]*version[[:space:]]*=[[:space:]]*)?"([^"]+)".*/\2/p'
          }

          dependencies=(wasm-bindgen web-sys wasm-bindgen-futures)
          for dependency in "${dependencies[@]}"; do
            ws_pin="$(extract_pin Cargo.toml "$dependency")"
            inner_pin="$(extract_pin examples/wasm/Cargo.toml "$dependency")"
            if [ -z "$ws_pin" ] || [ -z "$inner_pin" ] || [ "$inner_pin" != "$ws_pin" ]; then
              echo "::error::${dependency} pin in examples/wasm/Cargo.toml (${inner_pin:-missing}) does not match workspace (${ws_pin:-missing})" >&2
              exit 1
            fi

            for manifest in examples/wasm/*/Cargo.toml; do
              if grep -Eq "^${dependency}\.workspace[[:space:]]*=[[:space:]]*true" "$manifest"; then
                continue
              fi
              if grep -Eq "^${dependency}[[:space:]]*=[[:space:]]*\{[^}]*workspace[[:space:]]*=[[:space:]]*true" "$manifest"; then
                continue
              fi
              member_pin="$(extract_pin "$manifest" "$dependency")"
              if [ -n "$member_pin" ] && [ "$member_pin" != "$ws_pin" ]; then
                echo "::error::${dependency} pin in ${manifest} (${member_pin}) does not match workspace (${ws_pin})" >&2
                exit 1
              fi
            done
          done
          echo "All inner-workspace WASM pins match"
      - name: Build SDK for wasm
        run: cargo build --target wasm32-unknown-unknown -p cow-sdk
      - name: Build SDK for wasm with browser wallet
        run: cargo build --target wasm32-unknown-unknown -p cow-sdk --features browser-wallet
      - name: Build browser-wallet crate for wasm
        run: cargo build --target wasm32-unknown-unknown -p cow-sdk-browser-wallet
      - name: Check signing crate for wasm
        run: cargo check --target wasm32-unknown-unknown -p cow-sdk-signing
      - name: Build app-data for wasm
        run: cargo build --target wasm32-unknown-unknown -p cow-sdk-app-data
      - name: Check SDK examples for wasm
        run: cargo check --target wasm32-unknown-unknown -p cow-sdk --examples
      - name: Build sdk verification console
        run: cargo build --target wasm32-unknown-unknown --manifest-path examples/wasm/sdk-verification-console/Cargo.toml
      - name: Build browser wallet console
        run: cargo build --target wasm32-unknown-unknown --manifest-path examples/wasm/browser-wallet-console/Cargo.toml
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked
      - name: Test browser-wallet direct bridge in headless Chrome
        working-directory: crates/browser-wallet
        run: wasm-pack test --headless --chrome
      - name: Test trading crate wasm32 contract in headless Chrome
        working-directory: crates/trading
        run: wasm-pack test --headless --chrome
      - name: Test signing crate wasm32 contract in headless Chrome
        working-directory: crates/signing
        run: wasm-pack test --headless --chrome
      - name: Test sdk verification console exports in headless Chrome
        working-directory: examples/wasm/sdk-verification-console
        run: wasm-pack test --headless --chrome
      - name: Build sdk verification console web package
        working-directory: examples/wasm/sdk-verification-console
        run: wasm-pack build --target web
      - name: Build browser wallet console web package
        working-directory: examples/wasm/browser-wallet-console
        run: wasm-pack build --target web
