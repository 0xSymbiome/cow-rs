name: docs-quality

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/docs-quality.yml'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'PROPERTIES.md'
      - 'README.md'
      - 'SECURITY.md'
      - 'docs/**'
      - 'crates/*/README.md'
  push:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/docs-quality.yml'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'PROPERTIES.md'
      - 'README.md'
      - 'SECURITY.md'
      - 'docs/**'
      - 'crates/*/README.md'
  # schedule: daily cron paused during pre-publication; restore the schedule: block when ready

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  CARGO_TERM_COLOR: always
  RUST_CI_TOOLCHAIN: 1.94.1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ env.RUST_CI_TOOLCHAIN }}
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Run workspace doctests
        run: cargo test --workspace --doc
      - name: Run workspace all-feature doctests
        run: cargo test --all-features --workspace --doc

  docsrs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: nightly
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Build docs.rs-style workspace documentation
        # `cargo +nightly` overrides the workspace `rust-toolchain.toml`
        # pin so the nightly-only RUSTDOCFLAGS below are honored. Without
        # the override, rustup auto-selects the pinned stable toolchain
        # and stable rustdoc rejects `-Zunstable-options` and friends.
        run: cargo +nightly doc --workspace --all-features --no-deps
        env:
          DOCS_RS: '1'
          RUSTDOCFLAGS: --cfg docsrs -D warnings -Zunstable-options --generate-link-to-definition --show-type-layout --enable-index-page
      - name: Smoke-check rendered crate README sections
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re

          class HeadingExtractor(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.headings = []
                  self.current = None

              def handle_starttag(self, tag, attrs):
                  if re.fullmatch(r"h[1-6]", tag):
                      attrs = dict(attrs)
                      self.current = {
                          "tag": tag,
                          "id": attrs.get("id", ""),
                          "parts": [],
                      }

              def handle_endtag(self, tag):
                  if self.current and self.current["tag"] == tag:
                      text = " ".join(
                          part.strip() for part in self.current["parts"] if part.strip()
                      )
                      self.headings.append((self.current["tag"], self.current["id"], text))
                      self.current = None

              def handle_data(self, data):
                  if self.current:
                      self.current["parts"].append(data)

          def canonical_anchor(heading):
              slug = re.sub(r"[^a-z0-9]+", "-", heading.lower()).strip("-")
              return slug

          crates = {
              "core": "cow_sdk_core",
              "contracts": "cow_sdk_contracts",
              "signing": "cow_sdk_signing",
              "app-data": "cow_sdk_app_data",
              "orderbook": "cow_sdk_orderbook",
              "trading": "cow_sdk_trading",
              "subgraph": "cow_sdk_subgraph",
              "browser-wallet": "cow_sdk_browser_wallet",
              "transport-wasm": "cow_sdk_transport_wasm",
              "sdk": "cow_sdk",
          }

          for crate_dir, doc_dir in crates.items():
              readme = Path("crates") / crate_dir / "README.md"
              heading = next(
                  line[2:].strip()
                  for line in readme.read_text(encoding="utf-8").splitlines()
                  if line.startswith("# ")
              )
              html = Path("target/doc") / doc_dir / "index.html"
              parser = HeadingExtractor()
              parser.feed(html.read_text(encoding="utf-8"))
              expected_anchor = canonical_anchor(heading)
              if not any(
                  text == heading and anchor == expected_anchor
                  for _tag, anchor, text in parser.headings
              ):
                  raise SystemExit(
                      f"{html} is missing README heading {heading!r} at canonical anchor {expected_anchor!r}"
                  )
          PY
