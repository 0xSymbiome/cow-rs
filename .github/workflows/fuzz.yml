name: fuzz

# Scheduled weekly cadence on Fridays at 05:00 UTC. Spreads load across the
# week alongside the Monday benchmarks slot, the Tuesday crate-checks slot,
# the Wednesday codeql slot, and the Thursday test-depth slot. The lane is
# report-only: a crash surfaces through workflow status and the uploaded
# corpus and artifacts directories, but the lane does not gate PRs or
# releases. If a real defect is found, the fix lands through its own change
# set rather than being patched into this workflow.
on:
  schedule:
    - cron: '0 5 * * 5'
  workflow_dispatch:

permissions:
  contents: read

env:
  # Pin the nightly toolchain date so libFuzzer behaviour stays reproducible
  # across scheduled runs. Bump when the pinned date ages out of cargo-fuzz
  # compatibility.
  RUST_FUZZ_TOOLCHAIN: nightly-2026-04-15
  # Per-target fuzz duration in seconds. Ten targets × five minutes each
  # fits within the 60-minute job timeout because the strategy matrix runs
  # every target in its own parallel job.
  FUZZ_DURATION_SECONDS: '300'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # A cancelled scheduled run should not abort a concurrent
  # `workflow_dispatch` rerun a maintainer launches to investigate a
  # crash artifact.
  cancel-in-progress: false

jobs:
  fuzz:
    name: fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_order_uid_pack_unpack
          - fuzz_typed_data_digest
          - fuzz_app_data_cid_roundtrip
          - fuzz_order_signature_classify
          - fuzz_subgraph_graphql_error_decode
          - fuzz_settlement_settle_encode
          - fuzz_settlement_invalidate_order_encode
          - fuzz_ethflow_create_order_encode
          - fuzz_erc20_permit_typed_data_hash
          - fuzz_vault_relayer_transfer_from_accounts_encode
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ env.RUST_FUZZ_TOOLCHAIN }}
      # Source ref: taiki-e/install-action@v2
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2
        with:
          tool: cargo-fuzz
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          workspaces: |
            .
            fuzz
          shared-key: fuzz-${{ matrix.target }}
      - name: Build fuzz target
        shell: bash
        run: |
          cargo +${RUST_FUZZ_TOOLCHAIN} fuzz build --fuzz-dir fuzz "${{ matrix.target }}"
      - name: Run fuzz target
        shell: bash
        run: |
          cargo +${RUST_FUZZ_TOOLCHAIN} fuzz run "${{ matrix.target }}" \
            --fuzz-dir fuzz \
            -- -max_total_time=${FUZZ_DURATION_SECONDS}
      - name: Upload corpus and crash artifacts
        if: failure()
        # Source ref: actions/upload-artifact@v5.0.0
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: fuzz-${{ matrix.target }}-corpus-and-artifacts
          path: |
            fuzz/corpus/${{ matrix.target }}/
            fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore
          retention-days: 14
