name: benchmarks

on:
  schedule:
    # Weekly cadence on Mondays at 06:00 UTC. Non-blocking; results are only
    # uploaded as build artifacts so this workflow never gates PRs or releases.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  CARGO_TERM_COLOR: always
  RUST_CI_TOOLCHAIN: 1.94.1

jobs:
  criterion:
    name: criterion benchmarks (${{ matrix.crate }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        crate:
          - cow-sdk-contracts
          - cow-sdk-signing
          - cow-sdk-app-data
          - cow-sdk-orderbook
          - cow-sdk-trading
    steps:
      - name: Checkout repository
        # Source ref: actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${RUST_CI_TOOLCHAIN}" --profile minimal --component clippy,rustfmt
          rustup default "${RUST_CI_TOOLCHAIN}"

      - name: Cache cargo build artifacts
        # Source ref: actions/cache@v4
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-bench-${{ matrix.crate }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Compile benches
        run: cargo bench -p ${{ matrix.crate }} --no-run

      - name: Run benches
        run: cargo bench -p ${{ matrix.crate }} -- --output-format bencher | tee bench-output-${{ matrix.crate }}.txt

      - name: Upload criterion reports
        if: always()
        # Source ref: actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: criterion-reports-${{ matrix.crate }}
          path: |
            target/criterion/**/report/index.html
            target/criterion/**/*.json
            bench-output-${{ matrix.crate }}.txt
          if-no-files-found: ignore
          retention-days: 14
