name: component

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.cargo/**'
      - '.github/workflows/component.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/component/**'
      - 'crates/core/**'
      - 'crates/signing/**'
      - 'crates/contracts/**'
      - 'crates/app-data/**'
      - 'crates/orderbook/**'
      - 'crates/trading/**'
      - 'rust-toolchain.toml'
  push:
    branches:
      - main
      - develop
    paths:
      - '.cargo/**'
      - '.github/workflows/component.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/component/**'
      - 'crates/core/**'
      - 'crates/signing/**'
      - 'crates/contracts/**'
      - 'crates/app-data/**'
      - 'crates/orderbook/**'
      - 'crates/trading/**'
      - 'rust-toolchain.toml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # CI never debugs these binaries; dropping debuginfo keeps the wasm32-wasip2
  # build under the hosted runner's disk budget.
  CARGO_PROFILE_DEV_DEBUG: '0'

jobs:
  component-build:
    name: WASM Component (wasm32-wasip2)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Install wasm32-wasip2 on the workspace-pinned toolchain
        # The dtolnay action installs targets on its @stable channel; cargo then
        # runs under the workspace rust-toolchain.toml override, which lacks the
        # target. Running `rustup target add` from the workspace dir resolves the
        # override first, so the target lands on the toolchain cargo actually uses.
        run: rustup target add wasm32-wasip2
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      # The three worlds are mutually exclusive (one cdylib is one component), so
      # each is built on its own. -D warnings keeps a dead-code or unused-import
      # regression in any world from shipping silently — the native --workspace
      # gate compiles the wasm32-gated client/engine modules to nothing.
      - name: Build the engine world (default)
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo build -p cow-sdk-component --target wasm32-wasip2
      - name: Build the synchronous client world (WASI 0.2)
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo build -p cow-sdk-component --target wasm32-wasip2 --no-default-features --features world-client-sync
      - name: Build the asynchronous client world (WASI 0.3)
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo build -p cow-sdk-component --target wasm32-wasip2 --no-default-features --features world-client-async
      - name: The engine golden test stays green on the host
        run: cargo test -p cow-sdk-component
      - name: The world guard fails closed when no world is selected
        # The crate's `compile_error!` enforces exactly one world per cdylib;
        # selecting none must fail the build with that message. Asserting the
        # message keeps this negative check from passing on an unrelated error.
        run: |
          if cargo build -p cow-sdk-component --target wasm32-wasip2 --no-default-features 2>guard.log; then
            echo "expected the world guard to fail the no-world build" >&2
            exit 1
          fi
          grep -q "select exactly one world" guard.log

  component-success:
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    needs:
      - component-build
    steps:
      # Source ref: re-actors/alls-green@release/v1
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe
        with:
          jobs: ${{ toJSON(needs) }}
