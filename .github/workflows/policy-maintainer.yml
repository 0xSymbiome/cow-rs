name: policy-maintainer

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.cargo/**'
      - '.github/workflows/policy-maintainer.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/wasm/**'
      - 'scripts/policy-maintainer/**'
  push:
    branches:
      - main
      - develop
    paths:
      - '.cargo/**'
      - '.github/workflows/policy-maintainer.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/wasm/**'
      - 'scripts/policy-maintainer/**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  CARGO_TERM_COLOR: always

jobs:
  wasm-invariant:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: wasm32-unknown-unknown
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Run wasm invariant check
        run: cargo check-wasm-invariant
