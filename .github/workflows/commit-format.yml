name: commit-format

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

concurrency:
  group: commit-format-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}

      # Source ref: actions/setup-python@v5
      - uses: actions/setup-python@42375524a9d38cf44e4300fc706dbd8e213cb0b2
        with:
          python-version: "3.11"

      - name: Fetch base commit
        run: git fetch --no-tags origin ${{ github.event.pull_request.base.ref }}

      - name: Validate commit messages
        shell: bash
        run: |
          python - <<'PY'
          import re
          import subprocess
          import sys

          base = "${{ github.event.pull_request.base.sha }}"
          head = "${{ github.event.pull_request.head.sha }}"
          subject_re = re.compile(
              r"^(build|chore|ci|docs|feat|fix|perf|quality|refactor|revert|style|test)"
              r"(?:\([a-z0-9][a-z0-9-]*\))?!?: [a-z0-9].*[^.\s]$"
          )

          def git(*args: str) -> str:
              result = subprocess.run(
                  ["git", *args],
                  check=True,
                  text=True,
                  capture_output=True,
              )
              return result.stdout

          failures = []
          shas = [line.strip() for line in git("rev-list", "--reverse", f"{base}..{head}").splitlines() if line.strip()]

          for sha in shas:
              parents = git("rev-list", "--parents", "-n", "1", sha).strip().split()
              if len(parents) > 2:
                  continue

              subject = git("show", "-s", "--format=%s", sha).strip()
              body = git("show", "-s", "--format=%b", sha)
              errors = []

              if not subject_re.match(subject):
                  errors.append("subject must match '<type>(<scope>): <imperative summary>' in lowercase conventional-commit style")

              body_lines = [line.rstrip() for line in body.splitlines() if line.strip()]
              if not body_lines:
                  errors.append("body must contain at least one bullet line")
              elif any(not line.startswith("- ") for line in body_lines):
                  errors.append("every non-empty body line must start with '- '")

              if errors:
                  failures.append((sha, subject, errors))

          if not failures:
              print("Commit format OK")
              sys.exit(0)

          print("Commit format validation failed:", file=sys.stderr)
          for sha, subject, errors in failures:
              print(file=sys.stderr)
              print(f"{sha[:12]} {subject}", file=sys.stderr)
              for error in errors:
                  print(f"  - {error}", file=sys.stderr)

          sys.exit(1)
          PY
