name: services-drift

on:
  schedule:
    # Weekly on Monday 06:00 UTC; matches the release-readiness cadence.
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  detect-drift:
    name: Detect upstream services drift
    runs-on: ubuntu-latest
    steps:
      # Source ref: actions/checkout@v4
      - name: Checkout cow-rs
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Materialize upstream services worktree
        run: bash scripts/fetch-upstream-pins.sh --into /tmp

      - name: Run drift detection
        id: drift
        run: |
          bash scripts/check-services-drift.sh \
            --upstream /tmp/services \
            --summary-output /tmp/services-drift-report.md
          cat /tmp/services-drift-report.md >> "$GITHUB_STEP_SUMMARY"

      # Source ref: actions/github-script@v7
      - name: Open tracking issue on detected drift
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/services-drift-report.md', 'utf8');
            const issue = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[services-drift] Newly-detected upstream divergence',
              body,
              labels: ['services-drift'],
            };

            try {
              await github.rest.issues.create(issue);
            } catch (error) {
              if (error.status !== 422) {
                throw error;
              }

              delete issue.labels;
              await github.rest.issues.create(issue);
            }
