name: parity-drift

on:
  # schedule: weekly cron paused during pre-publication; restore the schedule: block when ready
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  detect-drift:
    name: Detect upstream parity drift
    runs-on: ubuntu-latest
    steps:
      # Source ref: actions/checkout@v4
      - name: Checkout cow-rs
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false

      # Source ref: dtolnay/rust-toolchain@stable
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable

      - name: Materialize upstream parity worktrees
        run: cargo parity-provision-upstreams --source-lock parity/source-lock.yaml --output-root /tmp/upstreams

      - name: Run drift detection
        id: drift
        run: |
          bash scripts/check-services-drift.sh \
            --upstream /tmp/upstreams/services \
            --contracts-upstream /tmp/upstreams/contracts \
            --cow-sdk-upstream /tmp/upstreams/cow-sdk \
            --summary-output /tmp/parity-drift-report.md
          cat /tmp/parity-drift-report.md >> "$GITHUB_STEP_SUMMARY"

      # Source ref: actions/github-script@v7
      - name: Open tracking issue on detected drift
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/parity-drift-report.md', 'utf8');
            const issue = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[parity-drift] Newly-detected upstream divergence',
              body,
              labels: ['parity-drift'],
            };

            try {
              await github.rest.issues.create(issue);
            } catch (error) {
              if (error.status !== 422) {
                throw error;
              }

              delete issue.labels;
              await github.rest.issues.create(issue);
            }
