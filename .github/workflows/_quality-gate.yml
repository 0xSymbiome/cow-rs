name: _quality-gate

# Reusable workflow that owns the shared quality-gate jobs consumed by the
# `ci` workflow and the `release-readiness` workflow. Both callers delegate
# via `uses: ./.github/workflows/_quality-gate.yml` so the fmt, clippy,
# test, nextest, doc, typos, deny, audit, feature-matrix, and
# public-api-lints jobs have a single source of truth.

on:
  workflow_call:
    inputs:
      rust_toolchain:
        description: Rust toolchain channel used by the shared quality-gate jobs.
        required: false
        type: string
        default: '1.94.1'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
          components: rustfmt
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
          components: clippy
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Run workspace library and integration tests
        run: cargo test --workspace --lib --tests
      - name: Check sdk examples
        run: cargo check -p cow-sdk --examples
      - name: Check native showcase examples
        run: cargo check --manifest-path examples/native/Cargo.toml --examples

  nextest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      # Source ref: taiki-e/install-action@v2
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2
        with:
          tool: nextest
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Run workspace nextest suite
        run: cargo nextest run --workspace --all-features --config-file .github/config/nextest.toml

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Build workspace documentation
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: taiki-e/install-action@v2
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2
        with:
          tool: typos-cli
      - name: Check repository spelling
        run: typos --config .github/config/typos.toml

  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: taiki-e/install-action@v2
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2
        with:
          tool: cargo-deny
      # Source ref: taiki-e/install-action@v2
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2
        with:
          tool: cargo-audit
      - name: Check dependency policy
        run: cargo deny check bans licenses sources --config .github/config/deny.toml
      - name: Check RustSec advisories
        # Ignore list rationale (each entry tracked in docs/audit/dependency-gate-audit.md):
        #   RUSTSEC-2026-0097 — reviewed upstream posture; no direct upgrade path
        #   RUSTSEC-2024-0388 — reviewed upstream posture; no direct upgrade path
        #   RUSTSEC-2024-0436 — reviewed upstream posture; no direct upgrade path
        #   RUSTSEC-2026-0105 — core2 yanked upstream reached transitively through cid; see docs/audit/cid-dependency-audit.md
        run: cargo audit --deny unsound --deny unmaintained --ignore RUSTSEC-2026-0097 --ignore RUSTSEC-2024-0388 --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2026-0105

  feature-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      # Source ref: taiki-e/install-action@v2
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2
        with:
          tool: cargo-hack
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Check workspace feature matrix
        run: cargo hack check --workspace --feature-powerset --depth 1

  public-api-lints:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Check published crate public API lints
        run: cargo check --workspace --all-features
        env:
          RUSTFLAGS: -Wmissing-docs -Wmissing-debug-implementations -Wunreachable-pub -Wunnameable-types

  alloy-provider-invariant:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Assert no shipped leaf crate depends on alloy-provider
        shell: bash
        run: |
          set -uo pipefail
          # The published cow-sdk crate family must not depend on alloy-provider,
          # directly or transitively. Consumers own their chain-RPC runtime
          # through the cow-sdk-core AsyncProvider seam.
          #
          # When alloy-provider is absent from the dependency graph, cargo
          # tree exits non-zero with "package ID specification ... did not
          # match any packages". That exit is the green signal.
          output="$(cargo tree --invert alloy-provider \
            -p cow-sdk-core \
            -p cow-sdk-contracts \
            -p cow-sdk-signing \
            -p cow-sdk-orderbook \
            -p cow-sdk-subgraph \
            -p cow-sdk-app-data \
            -p cow-sdk-trading \
            -p cow-sdk-browser-wallet \
            -p cow-sdk 2>&1 || true)"
          if printf '%s\n' "$output" | grep -q 'did not match any packages'; then
            echo "alloy-provider invariant holds: the crate is absent from the dependency graph."
            exit 0
          fi
          if printf '%s\n' "$output" | grep -qE '^alloy-provider'; then
            echo "::error::alloy-provider leaked into a first-release crate:" >&2
            printf '%s\n' "$output" >&2
            exit 1
          fi
          echo "alloy-provider invariant holds for the first-release crate set."

  docs-agree-on-release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Verify release-gate commands agree across docs and CI
        run: scripts/check-release-docs-agree.sh
      - name: Self-test docs-agreement script
        run: bash scripts/test-check-release-docs-agree.sh
