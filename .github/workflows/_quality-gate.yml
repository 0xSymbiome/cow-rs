name: _quality-gate

# Reusable workflow that owns the shared quality-gate jobs consumed by the
# `ci` workflow and the `release-readiness` workflow. Both callers delegate
# via `uses: ./.github/workflows/_quality-gate.yml` so the fmt, clippy,
# test, nextest, doc, typos, deny, audit, feature-matrix, and
# public-api-lints jobs have a single source of truth.

on:
  workflow_call:
    inputs:
      rust_toolchain:
        description: Rust toolchain channel used by the shared quality-gate jobs.
        required: false
        type: string
        default: '1.94.1'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  CARGO_TERM_COLOR: always

jobs:
  workflow-security:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Assert workflow action refs are SHA-pinned
        shell: bash
        run: |
          set -euo pipefail
          failures=0
          while IFS= read -r hit; do
            file="${hit%%:*}"
            rest="${hit#*:}"
            line="${rest%%:*}"
            text="${rest#*:}"
            ref="$(printf '%s\n' "$text" | sed -E 's/^[[:space:]]*(-[[:space:]]*)?uses:[[:space:]]*//; s/[[:space:]]+#.*$//; s/[[:space:]]+$//')"
            if [[ "$ref" == ./* ]]; then
              continue
            fi
            if [[ ! "$ref" =~ @[0-9a-f]{40}$ ]]; then
              echo "::error file=${file},line=${line}::GitHub Action ref must be pinned to a 40-character commit SHA: ${ref}" >&2
              failures=1
            fi
          done < <(grep -RInE '^[[:space:]]*(-[[:space:]]*)?uses:[[:space:]]*[^[:space:]#]+' .github/workflows/*.yml || true)
          exit "$failures"
      - name: Assert pull_request_target triggers are reviewed
        shell: bash
        run: |
          set -euo pipefail
          failures=0
          while IFS= read -r file; do
            if ! grep -qE '#[[:space:]]*allow-pull-request-target:[[:space:]]*.+' "$file"; then
              echo "::error file=${file}::pull_request_target requires an explicit '# allow-pull-request-target: <review rationale>' comment." >&2
              failures=1
            fi
          done < <(grep -RIlE '^[[:space:]]*(-[[:space:]]*)?pull_request_target[[:space:]]*:|^[[:space:]]*on:[^#]*pull_request_target' .github/workflows/*.yml || true)
          exit "$failures"

  policy-maintainer-smoke:
    name: policy-maintainer smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      - name: Check policy-maintainer help
        run: cargo check-stub --help
      - name: Run policy-maintainer check-stub
        run: cargo check-stub

  no-new-shell-wrappers:
    name: No new shell wrappers
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Reject new shell dispatch wrappers
        shell: bash
        run: |
          set -euo pipefail
          allowed_legacy='check-release-docs-agree.sh|check-services-drift.sh'
          found="$(
            find scripts -maxdepth 2 -type f \( -name '*.sh' -o -name '*.ps1' \) \
              | grep -Ev "/(${allowed_legacy})$" || true
          )"
          if [ -n "$found" ]; then
            echo "Forbidden shell wrapper(s) found:"
            echo "$found"
            echo
            echo "Use a Cargo alias in .cargo/config.toml instead."
            exit 1
          fi

  enum-policy:
    name: Enum policy coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      - name: Check enum policy coverage
        run: cargo check-enum-policy

  panic-allowlist:
    name: Panic allowlist
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      - name: Check panic allowlist
        run: cargo check-panic-allowlist

  deny-unknown-fields-coverage:
    name: deny_unknown_fields coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      - name: Check deny_unknown_fields coverage
        run: cargo check-deny-unknown-fields

  openapi-coverage:
    name: OpenAPI DTO coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      - name: Validate OpenAPI DTO coverage
        run: cargo parity-openapi-coverage --validate

  workspace-version-alignment:
    name: Workspace version alignment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      - name: Check workspace version alignment
        run: cargo check-workspace-versions

  chain-patch-eligibility:
    name: Chain patch eligibility
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      - name: Check chain patch eligibility
        if: github.event_name == 'pull_request'
        run: cargo check-chain-patch-eligibility --base-ref "${{ github.event.pull_request.base.ref }}"
      - name: Skip chain patch eligibility outside pull requests
        if: github.event_name != 'pull_request'
        run: echo "Chain patch eligibility is only evaluated for pull requests."

  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
          components: rustfmt
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
          components: clippy
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Run workspace library and integration tests
        run: cargo test --workspace --lib --tests
      - name: Check sdk examples
        run: cargo check -p cow-sdk --examples
      - name: Check native showcase examples
        run: cargo check --manifest-path examples/native/Cargo.toml --examples

  nextest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      # Source ref: taiki-e/install-action@v2
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2
        with:
          tool: nextest
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Run workspace nextest suite
        run: cargo nextest run --workspace --all-features --config-file .github/config/nextest.toml

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Build workspace documentation
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: taiki-e/install-action@v2
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2
        with:
          tool: typos-cli
      - name: Check repository spelling
        run: typos --config .github/config/typos.toml

  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: taiki-e/install-action@v2
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2
        with:
          tool: cargo-deny
      # Source ref: taiki-e/install-action@v2
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2
        with:
          tool: cargo-audit
      - name: Verify alloy-* workspace pins on same minor
        shell: bash
        run: |
          set -euo pipefail
          alloy_lines="$(grep -E '^alloy-[a-z-]+[[:space:]]*=' Cargo.toml || true)"
          if [ -z "$alloy_lines" ]; then
            echo "::error::no alloy-* workspace pins found in Cargo.toml" >&2
            exit 1
          fi
          pins="$(printf '%s\n' "$alloy_lines" | sed -nE 's/^alloy-[a-z-]+[[:space:]]*=[[:space:]]*(\{[[:space:]]*version[[:space:]]*=[[:space:]]*)?"([0-9]+\.[0-9]+).*/\2/p' | sort -u)"
          alloy_count="$(printf '%s\n' "$alloy_lines" | grep -c .)"
          parsed_count="$(printf '%s\n' "$alloy_lines" | sed -nE 's/^alloy-[a-z-]+[[:space:]]*=[[:space:]]*(\{[[:space:]]*version[[:space:]]*=[[:space:]]*)?"([0-9]+\.[0-9]+).*/\2/p' | grep -c .)"
          pin_count="$(printf '%s\n' "$pins" | grep -c .)"
          if [ "$parsed_count" -ne "$alloy_count" ] || [ "$pin_count" -ne 1 ]; then
            echo "alloy-* pins disagree on major.minor or could not be parsed:" >&2
            grep -E '^alloy-[a-z-]+[[:space:]]*=' Cargo.toml >&2
            exit 1
          fi
          echo "alloy-* pins all on $pins"
      - name: Verify WASM inner workspace pins match root
        shell: bash
        run: |
          set -euo pipefail
          extract_version() {
            local manifest="$1"
            local dependency="$2"
            { grep -E "^${dependency}[[:space:]]*=" "$manifest" || true; } \
              | sed -nE 's/^'"${dependency}"'[[:space:]]*=[[:space:]]*(\{[[:space:]]*version[[:space:]]*=[[:space:]]*)?"([^"]+)".*/\2/p' \
              | head -n 1
          }
          failures=0
          for dependency in wasm-bindgen wasm-bindgen-futures wasm-bindgen-test web-sys; do
            root_version="$(extract_version Cargo.toml "$dependency")"
            inner_version="$(extract_version examples/wasm/Cargo.toml "$dependency")"
            if [ -z "$root_version" ] || [ -z "$inner_version" ]; then
              echo "::error::could not parse ${dependency} version from Cargo.toml and examples/wasm/Cargo.toml" >&2
              failures=1
              continue
            fi
            if [ "$root_version" != "$inner_version" ]; then
              echo "::error::${dependency} pin drift: root=${root_version}, examples/wasm=${inner_version}" >&2
              failures=1
            fi
          done
          exit "$failures"
      - name: Check dependency policy
        run: cargo deny check --config .github/config/deny.toml
      - name: Check RustSec advisories
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t audit_ignore_args < <(python - <<'PY'
          import tomllib
          from pathlib import Path

          config = tomllib.loads(Path(".github/config/deny.toml").read_text(encoding="utf-8"))
          for entry in config.get("advisories", {}).get("ignore", []):
              advisory_id = entry["id"] if isinstance(entry, dict) else entry
              print("--ignore")
              print(advisory_id)
          PY
          )
          cargo audit --deny unsound --deny unmaintained "${audit_ignore_args[@]}"

  feature-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      # Source ref: taiki-e/install-action@v2
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2
        with:
          tool: cargo-hack
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Check workspace feature matrix
        run: cargo hack check --workspace --feature-powerset --depth 1

  public-api-lints:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Check published crate public API lints
        run: cargo check --workspace --all-features
        env:
          RUSTFLAGS: -Dmissing-docs -Dmissing-debug-implementations -Dunreachable-pub -Dunnameable-types

  alloy-provider-invariant:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Assert no shipped leaf crate depends on alloy-provider
        run: |
          # docs-agreement package list:
          # cargo tree --invert alloy-provider \
          #   -p cow-sdk-core \
          #   -p cow-sdk-contracts \
          #   -p cow-sdk-signing \
          #   -p cow-sdk-orderbook \
          #   -p cow-sdk-subgraph \
          #   -p cow-sdk-app-data \
          #   -p cow-sdk-trading \
          #   -p cow-sdk-browser-wallet \
          #   -p cow-sdk 2>&1
          cargo check-alloy-provider-invariant

  adr-coverage:
    name: ADR coverage (blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      - name: Check principle ADR coverage
        run: |
          cargo check-adr-coverage --mode blocking

  cargo-semver-checks:
    name: cargo-semver-checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [test]
    steps:
      # Source ref: actions/checkout@v4
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install cargo-semver-checks
        run: |
          cargo install --locked \
            cargo-semver-checks --version 0.47.0
      - name: Classify release
        id: release-type
        run: |
          set -o pipefail
          classification="$(
            cargo classify-release \
              --base-ref "${{ github.base_ref || 'main' }}" \
              --head-ref HEAD \
              --json
          )"
          echo "${classification}" | jq -e . > /dev/null
          for key in release_kind is_first_functional_release is_patch is_minor is_major head_version base_version baseline_tag semver_checks_mode; do
            value="$(echo "${classification}" | jq -r ".${key}")"
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done
      - name: cargo-semver-checks (blocking)
        if: steps.release-type.outputs.semver_checks_mode == 'blocking'
        run: |
          set -o pipefail
          for crate in cow-sdk cow-sdk-core cow-sdk-contracts cow-sdk-signing cow-sdk-app-data cow-sdk-orderbook cow-sdk-trading cow-sdk-subgraph cow-sdk-browser-wallet cow-sdk-transport-wasm; do
            cargo semver-checks check-release \
              --package "${crate}" \
              --baseline-rev "${{ steps.release-type.outputs.baseline_tag }}"
          done 2>&1 | tee /tmp/semver-checks.log
      - name: cargo-semver-checks (advisory)
        if: steps.release-type.outputs.semver_checks_mode == 'advisory'
        run: |
          set -o pipefail
          for crate in cow-sdk cow-sdk-core cow-sdk-contracts cow-sdk-signing cow-sdk-app-data cow-sdk-orderbook cow-sdk-trading cow-sdk-subgraph cow-sdk-browser-wallet cow-sdk-transport-wasm; do
            cargo semver-checks check-release --package "${crate}" || true
          done 2>&1 | tee /tmp/semver-checks.log
      - name: cargo-semver-checks (skipped)
        if: steps.release-type.outputs.semver_checks_mode == 'skip'
        run: |
          echo "Skipping cargo-semver-checks because release classification is ${{ steps.release-type.outputs.release_kind }}." | tee /tmp/semver-checks.log
          echo "Reason: first functional release or major bump; no actionable baseline." | tee -a /tmp/semver-checks.log
      - name: Post report to step summary
        if: always()
        run: |
          echo '## cargo-semver-checks report' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo "mode: ${{ steps.release-type.outputs.semver_checks_mode || 'unavailable' }}" >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/semver-checks.log ]; then
            tail -200 /tmp/semver-checks.log >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'cargo-semver-checks did not produce a report.' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  docs-agree-on-release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Verify release-gate commands agree across docs and CI
        run: scripts/check-release-docs-agree.sh

  native-examples-locked:
    name: deterministic examples locked
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ inputs.rust_toolchain }}
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Check native examples with locked dependencies
        run: cargo check --locked --manifest-path examples/native/Cargo.toml --examples
      - name: Test native examples with locked dependencies
        run: cargo test --locked --manifest-path examples/native/Cargo.toml
      - name: Run deterministic examples with locked dependencies
        run: cargo run-deterministic-examples --locked
      - name: Assert native examples lockfile was not rewritten
        run: git diff --exit-code -- examples/native/Cargo.lock

  ci-success:
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    needs:
      - workflow-security
      - policy-maintainer-smoke
      - no-new-shell-wrappers
      - enum-policy
      - panic-allowlist
      - deny-unknown-fields-coverage
      - openapi-coverage
      - workspace-version-alignment
      - chain-patch-eligibility
      - fmt
      - clippy
      - test
      - nextest
      - docs
      - typos
      - deny
      - feature-matrix
      - public-api-lints
      - alloy-provider-invariant
      - adr-coverage
      - cargo-semver-checks
      - docs-agree-on-release-gates
      - native-examples-locked
    steps:
      # Source ref: re-actors/alls-green@release/v1
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe
        with:
          jobs: ${{ toJSON(needs) }}
