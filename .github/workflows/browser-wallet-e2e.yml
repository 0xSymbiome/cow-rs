name: browser-wallet-e2e

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/browser-wallet-e2e.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/browser-wallet/**'
      - 'crates/core/**'
      - 'crates/sdk/**'
      - 'e2e/browser-wallet/**'
      - 'examples/wasm/browser-wallet-console/**'
      - 'rust-toolchain.toml'
  push:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/browser-wallet-e2e.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/browser-wallet/**'
      - 'crates/core/**'
      - 'crates/sdk/**'
      - 'e2e/browser-wallet/**'
      - 'examples/wasm/browser-wallet-console/**'
      - 'rust-toolchain.toml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  browser-wallet:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Compile-profile knobs that keep the wasm32 browser-wallet test
      # binaries small enough for the ubuntu-latest runner to keep
      # headless Chrome and ChromeDriver resident at the same time.
      # The disk-reclaim and swap-expansion steps below free or page
      # bytes; these knobs shrink the actual test binaries that get
      # loaded into memory:
      #   * `*_DEBUG=0` drops the multi-GB debug sections that the
      #     unoptimised default profile emits and that no CI step
      #     consumes;
      #   * `*_OPT_LEVEL=1` turns on basic codegen optimisations so the
      #     emitted wasm shrinks several-fold compared to the default
      #     unoptimised output, without paying the full release-mode
      #     LTO cost;
      #   * `CARGO_INCREMENTAL=0` skips per-crate incremental
      #     metadata, which otherwise accumulates on disk and inflates
      #     peak resident memory across the host-target plus wasm32
      #     compile combination;
      #   * `CARGO_BUILD_JOBS=2` caps the parallel rustc fan-out so
      #     several heavy codegen units do not race headless Chrome
      #     for the same memory budget.
      # All four knobs are CI-only; nothing else runs a debugger
      # against the produced binaries, so the lost symbols are free.
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_PROFILE_DEV_OPT_LEVEL: "1"
      CARGO_PROFILE_TEST_OPT_LEVEL: "1"
      CARGO_INCREMENTAL: "0"
      CARGO_BUILD_JOBS: "2"
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Reclaim runner disk space
        shell: bash
        run: |
          set -euo pipefail
          echo "Disk usage before reclaim:"
          df -h /
          # Microsoft pre-installs ~30 GB of toolchains we do not use
          # for this Rust workspace. Removing them gives the
          # host-target test compile, the wasm32 test compile, and the
          # headless Chrome session enough headroom that the kernel
          # OOM killer stops sending SIGKILL to ChromeDriver during
          # wasm-pack test runs.
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          sudo apt-get clean || true
          echo "Disk usage after reclaim:"
          df -h /
      - name: Expand swap headroom
        shell: bash
        run: |
          set -euo pipefail
          echo "Memory before:"
          free -h
          # The default ubuntu-latest swapfile is small relative to the
          # peak host-target plus wasm32 test compile plus headless
          # Chrome footprint. Replace it with a larger backing file so
          # the kernel pages cold compile state out instead of sending
          # SIGKILL to ChromeDriver when the working set spikes.
          sudo swapoff -a
          sudo rm -f /mnt/swapfile
          sudo fallocate -l 12G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          echo "Memory after:"
          free -h
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: wasm32-unknown-unknown
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      # Source ref: oven-sh/setup-bun@v2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked

      - name: Test browser-wallet crate
        run: cargo test -p cow-sdk-browser-wallet

      - name: Set up pinned WASM browser runner
        env:
          WEBDRIVER_JSON: ${{ runner.temp }}/webdriver.json
        run: cargo wasm-runner-setup --webdriver-json "$WEBDRIVER_JSON"

      - name: Export pinned WASM browser runner paths
        env:
          WEBDRIVER_JSON: ${{ runner.temp }}/webdriver.json
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import json
          import os
          with open(os.environ["WEBDRIVER_JSON"], encoding="utf-8") as handle:
              webdriver = json.load(handle)
          print(f"WASM_BINDGEN_TEST_WEBDRIVER_JSON={os.environ['WEBDRIVER_JSON']}")
          print(f"WASM_BINDGEN_TEST_CHROMEDRIVER={webdriver['cow:wasmRunner']['chromedriver']}")
          PY

      - name: Test browser-wallet direct bridge in headless Chrome
        env:
          WEBDRIVER_JSON: ${{ runner.temp }}/webdriver.json
        working-directory: crates/browser-wallet
        # `--release` builds the wasm32 test binary under the workspace
        # release profile (`opt-level = "z"`, `lto = "fat"`,
        # `strip = "symbols"`), several times smaller than the
        # `opt-level = 1` dev-profile output the earlier mitigation
        # produced. Headless Chrome and ChromeDriver share the runner
        # memory budget with the loaded wasm; a smaller binary keeps
        # both resident through the handshake so the kernel does not
        # send SIGKILL to ChromeDriver during the test setup.
        run: wasm-pack test --release --headless --chrome --chromedriver "$WASM_BINDGEN_TEST_CHROMEDRIVER"

      - name: Build SDK for wasm with browser wallet
        run: cargo build --target wasm32-unknown-unknown -p cow-sdk --features browser-wallet

      - name: Build browser wallet console
        run: cargo build --target wasm32-unknown-unknown --manifest-path examples/wasm/browser-wallet-console/Cargo.toml

      - name: Test browser wallet console host-side
        run: cargo test --manifest-path examples/wasm/browser-wallet-console/Cargo.toml

      - name: Build browser wallet console web package
        working-directory: examples/wasm/browser-wallet-console
        run: wasm-pack build --target web

      - name: Set up pinned WASM browser runner
        env:
          WEBDRIVER_JSON: ${{ runner.temp }}/webdriver.json
        run: cargo wasm-runner-setup --webdriver-json "$WEBDRIVER_JSON"

      - name: Run browser wallet console wasm-bindgen tests
        env:
          WEBDRIVER_JSON: ${{ runner.temp }}/webdriver.json
        working-directory: examples/wasm/browser-wallet-console
        # Release-profile wasm32 test binary for the same SIGKILL
        # avoidance reason documented on the direct-bridge test above.
        run: wasm-pack test --release --headless --chrome --chromedriver "$WASM_BINDGEN_TEST_CHROMEDRIVER"

      - name: Install browser wallet e2e dependencies
        run: bun install --cwd e2e/browser-wallet --frozen-lockfile

      - name: Install Playwright browsers
        run: bun run --cwd e2e/browser-wallet playwright install --with-deps chromium firefox

      - name: Run browser wallet e2e
        run: bun run --cwd e2e/browser-wallet test
