name: browser-wallet-e2e

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/browser-wallet-e2e.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/browser-wallet/**'
      - 'crates/core/**'
      - 'crates/sdk/**'
      - 'e2e/browser-wallet/**'
      - 'examples/wasm/browser-wallet-console/**'
      - 'rust-toolchain.toml'
  push:
    branches:
      - main
      - develop
      - feat/**
    paths:
      - '.github/workflows/browser-wallet-e2e.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/browser-wallet/**'
      - 'crates/core/**'
      - 'crates/sdk/**'
      - 'e2e/browser-wallet/**'
      - 'examples/wasm/browser-wallet-console/**'
      - 'rust-toolchain.toml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-wallet:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: wasm32-unknown-unknown
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      # Source ref: oven-sh/setup-bun@v2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked

      - name: Test browser-wallet crate
        run: cargo test -p cow-sdk-browser-wallet

      - name: Test browser-wallet direct bridge in headless Chrome
        working-directory: crates/browser-wallet
        run: wasm-pack test --headless --chrome

      - name: Build SDK for wasm with browser wallet
        run: cargo build --target wasm32-unknown-unknown -p cow-sdk --features browser-wallet

      - name: Build browser wallet console
        run: cargo build --target wasm32-unknown-unknown --manifest-path examples/wasm/browser-wallet-console/Cargo.toml

      - name: Build browser wallet console web package
        working-directory: examples/wasm/browser-wallet-console
        run: wasm-pack build --target web

      - name: Install browser wallet e2e dependencies
        run: bun install --cwd e2e/browser-wallet --frozen-lockfile

      - name: Install Playwright Chromium
        run: bun run --cwd e2e/browser-wallet playwright install --with-deps chromium

      - name: Run browser wallet e2e
        run: bun run --cwd e2e/browser-wallet test
