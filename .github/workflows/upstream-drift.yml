name: upstream-drift

# Scheduled watch on the upstream producers pinned in parity/source-lock.yaml:
# `parity drift` compares every producer path's blob OID at the pin against
# the remote default branch and fails this job when anything moved (exit 1)
# or when a pin/fetch is broken (exit 2). The job is a detector, not a gate —
# it runs on a schedule, never in the pull-request lane, and the failure log
# carries the per-file drift table naming exactly what to refresh.

on:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  CARGO_TERM_COLOR: always
  RUST_CI_TOOLCHAIN: 1.94.1

jobs:
  drift:
    name: Producer-path drift vs upstream default branches
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ env.RUST_CI_TOOLCHAIN }}
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Report producer-path drift against the pins
        run: cargo xtask parity drift
      - name: Open a tracking issue when scheduled drift is detected
        if: ${{ failure() && github.event_name == 'schedule' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          title="upstream producer-path drift detected on $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body="$(printf 'The weekly upstream-drift watch reported producer-path movement against the pins. Review the run log for the per-file drift table and refresh the pins per parity/README.md.\n\nRun: %s\n' "${run_url}")"
          gh api --method POST "repos/${GITHUB_REPOSITORY}/labels" \
            -f name='parity-drift' \
            -f color='fbca04' \
            -f description='Weekly upstream producer-path drift' >/dev/null 2>&1 || true
          existing="$(gh api "repos/${GITHUB_REPOSITORY}/issues?state=open&labels=parity-drift&per_page=1" --jq 'length')"
          if [ "${existing}" -eq 0 ]; then
            gh api --method POST "repos/${GITHUB_REPOSITORY}/issues" \
              -f title="${title}" \
              -f body="${body}" \
              -f labels[]='parity-drift' >/dev/null
          fi
