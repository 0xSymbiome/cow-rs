name: release-version-coherence

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/release-version-coherence.yml'
      - 'Cargo.toml'
      - 'crates/wasm/Cargo.toml'
      - 'crates/wasm/npm/package.template.json'
  push:
    branches:
      - main
      - develop
      - feat/**
    paths:
      - '.github/workflows/release-version-coherence.yml'
      - 'Cargo.toml'
      - 'crates/wasm/Cargo.toml'
      - 'crates/wasm/npm/package.template.json'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  version-coherence:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Check Rust and npm versions
        run: |
          python - <<'PY'
          import json
          import sys
          import tomllib
          from pathlib import Path

          root = Path(".")
          workspace = tomllib.loads((root / "Cargo.toml").read_text(encoding="utf-8"))
          wasm = tomllib.loads((root / "crates/wasm/Cargo.toml").read_text(encoding="utf-8"))
          template = json.loads((root / "crates/wasm/npm/package.template.json").read_text(encoding="utf-8"))

          workspace_version = workspace["workspace"]["package"]["version"]
          wasm_version = wasm["package"].get("version")
          if isinstance(wasm_version, dict):
              if not wasm_version.get("workspace"):
                  print("::error::crates/wasm/Cargo.toml has an unsupported package.version table")
                  sys.exit(1)
          elif wasm_version is None:
              print("::error::crates/wasm/Cargo.toml must inherit the workspace version or set the same version")
              sys.exit(1)
          elif wasm_version != workspace_version:
              print(f"::error::cow-sdk-wasm version {wasm_version} does not match workspace version {workspace_version}")
              sys.exit(1)
          if template["version"] != workspace_version:
              print(f"::error::npm template version {template['version']} does not match workspace version {workspace_version}")
              sys.exit(1)
          print(f"version coherence holds for {workspace_version}")
          PY
