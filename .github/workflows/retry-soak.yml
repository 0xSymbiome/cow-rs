name: retry-soak

on:
  # schedule: daily cron paused during pre-publication; restore the schedule: block when ready
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  CARGO_TERM_COLOR: always
  RUST_CI_TOOLCHAIN: 1.94.1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-retry-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ env.RUST_CI_TOOLCHAIN }}
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Run deterministic retry and timeout soak
        run: cargo test -p cow-sdk-orderbook --test request_contract retry_timeout_soak_exercises_deterministic_waveforms -- --ignored --exact
