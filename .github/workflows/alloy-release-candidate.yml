name: alloy-release-candidate

on:
  workflow_dispatch:
  # schedule: weekly cron paused during pre-publication; restore the schedule: block when ready

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  CARGO_TERM_COLOR: always
  RUST_CI_TOOLCHAIN: 1.94.1
  ALLOY_CANARY_REF: ${{ vars.ALLOY_CANARY_REF || '0a8118146f4c546674a907122f3f2b817bbb79f5' }}
  ALLOY_CORE_CANARY_REF: ${{ vars.ALLOY_CORE_CANARY_REF || '2ebfa5b502e535d9864497579ebac7eeae30e27d' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  alloy-forward-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ env.RUST_CI_TOOLCHAIN }}
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Resolve configurable alloy canary ref
        id: alloy-ref
        shell: bash
        run: |
          set -euo pipefail
          resolve_ref() {
            local remote="$1"
            local ref="$2"
            local resolved
            resolved="$(git ls-remote "$remote" "$ref" "refs/heads/$ref" "refs/tags/$ref" | awk 'NR == 1 { print $1 }')"
            if [ -z "$resolved" ]; then
              if [[ "$ref" =~ ^[0-9a-fA-F]{40}$ ]]; then
                resolved="$ref"
              else
                echo "::error::${ref} did not resolve to a branch, tag, or full commit SHA"
                exit 1
              fi
            fi
            printf '%s' "$resolved"
          }
          alloy_remote="https://github.com/alloy-rs/alloy"
          core_remote="https://github.com/alloy-rs/core"
          alloy_ref="${ALLOY_CANARY_REF}"
          core_ref="${ALLOY_CORE_CANARY_REF}"
          resolved="$(resolve_ref "$alloy_remote" "$alloy_ref")"
          core_resolved="$(resolve_ref "$core_remote" "$core_ref")"
          echo "resolved=$resolved" >> "$GITHUB_OUTPUT"
          echo "core_resolved=$core_resolved" >> "$GITHUB_OUTPUT"
          {
            echo "# Alloy forward-compat canary"
            echo
            echo "- Runtime requested ref: \`$alloy_ref\`"
            echo "- Runtime resolved commit: \`$resolved\`"
            echo "- Core requested ref: \`$core_ref\`"
            echo "- Core resolved commit: \`$core_resolved\`"
            echo "- Mode: scheduled/manual drift report; no pull-request trigger"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Report forward-compat drift
        shell: bash
        run: |
          set -euo pipefail
          resolved="${{ steps.alloy-ref.outputs.resolved }}"
          core_resolved="${{ steps.alloy-ref.outputs.core_resolved }}"
          mkdir -p .cargo
          {
            echo '[patch.crates-io]'
            echo "alloy-consensus = { git = 'https://github.com/alloy-rs/alloy', rev = '${resolved}' }"
            echo "alloy-json-rpc = { git = 'https://github.com/alloy-rs/alloy', rev = '${resolved}' }"
            echo "alloy-network = { git = 'https://github.com/alloy-rs/alloy', rev = '${resolved}' }"
            echo "alloy-provider = { git = 'https://github.com/alloy-rs/alloy', rev = '${resolved}' }"
            echo "alloy-rpc-types-eth = { git = 'https://github.com/alloy-rs/alloy', rev = '${resolved}' }"
            echo "alloy-signer = { git = 'https://github.com/alloy-rs/alloy', rev = '${resolved}' }"
            echo "alloy-signer-local = { git = 'https://github.com/alloy-rs/alloy', rev = '${resolved}' }"
            echo "alloy-transport = { git = 'https://github.com/alloy-rs/alloy', rev = '${resolved}' }"
            echo "alloy-transport-http = { git = 'https://github.com/alloy-rs/alloy', rev = '${resolved}' }"
            echo "alloy-dyn-abi = { git = 'https://github.com/alloy-rs/core', rev = '${core_resolved}' }"
            echo "alloy-json-abi = { git = 'https://github.com/alloy-rs/core', rev = '${core_resolved}' }"
            echo "alloy-primitives = { git = 'https://github.com/alloy-rs/core', rev = '${core_resolved}' }"
            echo "alloy-sol-macro = { git = 'https://github.com/alloy-rs/core', rev = '${core_resolved}' }"
            echo "alloy-sol-types = { git = 'https://github.com/alloy-rs/core', rev = '${core_resolved}' }"
          } >> .cargo/config.toml
          cargo update \
            -p alloy-consensus \
            -p alloy-dyn-abi \
            -p alloy-json-rpc \
            -p alloy-json-abi \
            -p alloy-network \
            -p alloy-primitives \
            -p alloy-provider \
            -p alloy-rpc-types-eth \
            -p alloy-signer \
            -p alloy-signer-local \
            -p alloy-sol-macro \
            -p alloy-sol-types \
            -p alloy-transport \
            -p alloy-transport-http
          cargo check --workspace --all-features
      - name: Open a tracking issue when the canary fails
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          title="alloy canary failed on $(date -u +%Y-%m-%dT%H:%M:%SZ) run"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body="$(printf 'The weekly alloy canary detected a breakage with the latest configured alloy release candidate.\n\nRun: %s\n\nNext steps follow the Upgrade Rehearsal section of docs/adr/0026-alloy-major-release-absorption-plan.md.\n' "${run_url}")"
          gh api --method POST "repos/${GITHUB_REPOSITORY}/labels" \
            -f name='alloy-canary' \
            -f color='5319e7' \
            -f description='Alloy release-candidate canary failures' >/dev/null 2>&1 || true
          existing="$(gh api "repos/${GITHUB_REPOSITORY}/issues?state=open&labels=alloy-canary&per_page=1" --jq 'length')"
          if [ "${existing}" -eq 0 ]; then
            gh api --method POST "repos/${GITHUB_REPOSITORY}/issues" \
              -f title="${title}" \
              -f body="${body}" \
              -f labels[]='alloy-canary' >/dev/null
          fi
