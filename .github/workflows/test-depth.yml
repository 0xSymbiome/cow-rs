name: test-depth

on:
  workflow_dispatch:
    inputs:
      run_mutation:
        description: Include the targeted mutation report
        required: false
        type: boolean
        default: false
      mutation_scope:
        description: Mutation report scope
        required: false
        type: choice
        default: core
        options:
          - core
          - orderbook-trading
          - subgraph-browser-wallet
  schedule:
    - cron: '15 4 * * 4'

permissions:
  actions: read
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_COVERAGE_TOOLCHAIN: nightly
  RUST_CI_TOOLCHAIN: 1.94.1
  COVERAGE_IGNORE_REGEX: '(^|/)(tests|examples|e2e)(/|$)|crates/subgraph/src/query_documents/|crates/subgraph/tests/schema_evidence/'
  TEST_DEPTH_WORKFLOW_FILE: test-depth.yml

concurrency:
  group: test-depth-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ env.RUST_COVERAGE_TOOLCHAIN }}
          components: llvm-tools-preview
      # Source ref: taiki-e/install-action@v2
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2
        with:
          tool: cargo-llvm-cov
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Capture coverage depth report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/coverage
          cargo llvm-cov --workspace --all-features --doctests \
            --json --summary-only \
            --output-path artifacts/coverage/coverage-summary.json \
            --ignore-filename-regex "${COVERAGE_IGNORE_REGEX}"
          cargo llvm-cov --workspace --all-features --doctests \
            --lcov \
            --output-path artifacts/coverage/coverage-lcov.info \
            --ignore-filename-regex "${COVERAGE_IGNORE_REGEX}"
      - name: Fetch previous coverage trend snapshot
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cargo run --quiet --locked --manifest-path scripts/validation-depth/Cargo.toml -- fetch-previous-artifact \
            --repo "${{ github.repository }}" \
            --workflow "${TEST_DEPTH_WORKFLOW_FILE}" \
            --artifact-name test-depth-coverage-trend \
            --output-dir artifacts/coverage/previous \
            --branch "${{ github.event.repository.default_branch }}" \
            --exclude-run-id "${{ github.run_id }}"
      - name: Publish coverage trend summary
        shell: bash
        run: |
          cargo run --quiet --locked --manifest-path scripts/validation-depth/Cargo.toml -- coverage-trend \
            --repo-root . \
            --current artifacts/coverage/coverage-summary.json \
            --output-md artifacts/coverage/summary.md \
            --output-json artifacts/coverage/coverage-trend.json \
            --previous artifacts/coverage/previous/coverage-trend.json
          cat artifacts/coverage/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage artifacts
        if: always()
        # Source ref: actions/upload-artifact@v5.0.0
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: test-depth-coverage
          path: artifacts/coverage
          if-no-files-found: error
      - name: Upload coverage trend snapshot
        if: always()
        # Source ref: actions/upload-artifact@v5.0.0
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: test-depth-coverage-trend
          path: artifacts/coverage/coverage-trend.json
          if-no-files-found: error

  mutation:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mutation }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Source ref: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ env.RUST_CI_TOOLCHAIN }}
      # Source ref: taiki-e/install-action@v2
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2
        with:
          tool: cargo-mutants
      # Source ref: Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Run targeted mutation report
        id: mutation_run
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/mutation
          scope="${{ inputs.mutation_scope || 'core' }}"
          case "${scope}" in
            core)
              cargo mutants -p cow-sdk-contracts -p cow-sdk-signing -p cow-sdk-app-data \
                --annotations none \
                --no-times \
                --output artifacts/mutation > artifacts/mutation/console.log 2>&1
              ;;
            orderbook-trading)
              cargo mutants -p cow-sdk-orderbook -p cow-sdk-trading \
                --file crates/orderbook/src/request.rs \
                --file crates/orderbook/src/transform.rs \
                --file crates/trading/src/order.rs \
                --file crates/trading/src/slippage.rs \
                --annotations none \
                --no-times \
                --re "decoded_body|execute_with|calculate_total_fee|add_decimal_strings|sanitize_protocol_fee_bps|partner_fee_bps|calculate_unique_order_id|adjust_buy_amount" \
                --output artifacts/mutation > artifacts/mutation/console.log 2>&1
              ;;
            subgraph-browser-wallet)
              cargo mutants -p cow-sdk-subgraph -p cow-sdk-browser-wallet \
                --file crates/subgraph/src/api.rs \
                --file crates/subgraph/src/types.rs \
                --file crates/browser-wallet/src/wallet.rs \
                --file crates/browser-wallet/src/provider.rs \
                --file crates/browser-wallet/src/error.rs \
                --annotations none \
                --no-times \
                --re "run_query_with_config|config_with_override|base_url_for|deserialize_string_or_number|deserialize_optional_string_or_number|deserialize_u64_from_string_or_number|value_to_string|single_wallet|wallet_at|requires_explicit_selection|refresh_session|switch_or_add_chain|switch_chain_request|add_chain_request|validate_wallet_text|validate_wallet_url|query_accounts|query_chain_id|reset_session|parse_chain_id_value|parse_quantity_to_decimal|parse_address_array|transaction_to_rpc|from_rpc" \
                --output artifacts/mutation > artifacts/mutation/console.log 2>&1
              ;;
            *)
              echo "unsupported mutation scope: ${scope}" > artifacts/mutation/console.log
              exit 2
              ;;
          esac
          status=$?
          echo "scope=${scope}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Ensure mutation report is present
        shell: bash
        run: |
          test -f artifacts/mutation/mutants.out/outcomes.json
      - name: Fetch previous mutation trend snapshot
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cargo run --quiet --locked --manifest-path scripts/validation-depth/Cargo.toml -- fetch-previous-artifact \
            --repo "${{ github.repository }}" \
            --workflow "${TEST_DEPTH_WORKFLOW_FILE}" \
            --artifact-name "test-depth-mutation-${{ steps.mutation_run.outputs.scope }}-trend" \
            --output-dir artifacts/mutation/previous \
            --branch "${{ github.event.repository.default_branch }}" \
            --exclude-run-id "${{ github.run_id }}"
      - name: Publish mutation trend summary
        shell: bash
        env:
          MUTATION_EXIT_CODE: ${{ steps.mutation_run.outputs.exit_code }}
          MUTATION_SCOPE: ${{ steps.mutation_run.outputs.scope }}
        run: |
          cargo run --quiet --locked --manifest-path scripts/validation-depth/Cargo.toml -- mutation-trend \
            --scope "${MUTATION_SCOPE}" \
            --current artifacts/mutation/mutants.out/outcomes.json \
            --output-md artifacts/mutation/summary.md \
            --output-json artifacts/mutation/mutation-trend.json \
            --previous artifacts/mutation/previous/mutation-trend.json \
            --exit-code "${MUTATION_EXIT_CODE}"
          cat artifacts/mutation/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload mutation artifacts
        if: always()
        # Source ref: actions/upload-artifact@v5.0.0
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: test-depth-mutation-${{ steps.mutation_run.outputs.scope }}
          path: artifacts/mutation
          if-no-files-found: error
      - name: Upload mutation trend snapshot
        if: always()
        # Source ref: actions/upload-artifact@v5.0.0
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: test-depth-mutation-${{ steps.mutation_run.outputs.scope }}-trend
          path: artifacts/mutation/mutation-trend.json
          if-no-files-found: error
