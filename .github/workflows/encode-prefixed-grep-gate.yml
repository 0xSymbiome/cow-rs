name: encode-prefixed-grep-gate

on:
  pull_request:
    paths:
      - '.github/workflows/encode-prefixed-grep-gate.yml'
      - 'crates/**/*.rs'
      - 'crates/**/Cargo.toml'
      - 'Cargo.toml'
  push:
    branches:
      - main
      - 'feat/**'
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  gate-encode-prefixed:
    name: encode_prefixed hand-roll fence (ADR 0052)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Source ref: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Reject format! hex-prefix join in production sources
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t sources < <(find crates -type f -name '*.rs' \
            -not -path 'crates/*/tests/*' \
            -not -path 'crates/*/benches/*' \
            -not -path 'crates/*/examples/*' \
            -not -path 'crates/*/fuzz/*' 2>/dev/null | sort || true)
          if [ "${#sources[@]}" -eq 0 ]; then
            echo "::error::No production crate sources found; refusing to silently pass."
            exit 1
          fi
          # Filter out `//`-prefixed lines so doc-comment narratives that
          # name the forbidden symbol cannot self-trigger this gate.
          violations="$(grep -nE '\bformat!\s*\(\s*"0x\{\}"\s*,\s*(alloy_primitives::)?hex::encode(_upper)?\s*\(' "${sources[@]}" 2>/dev/null | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//' || true)"
          if [ -n "$violations" ]; then
            printf '%s\n' "$violations" >&2
            echo "::error::Never-swap fence: format!(\"0x{}\", alloy_primitives::hex::encode(...)) is the legacy hand-roll. alloy_primitives::hex::encode_prefixed emits the same 0x-prefixed lowercase string in one call without the format!-template seam. ADR 0052 pins alloy_primitives as the canonical primitive layer; the hand-roll is forbidden in production sources."
            exit 1
          fi

  gate-encode-prefixed-bare-import:
    name: bare hex::encode import fence (ADR 0052)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Reject unqualified hex::encode imports in production sources
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t sources < <(find crates -type f -name '*.rs' \
            -not -path 'crates/*/tests/*' \
            -not -path 'crates/*/benches/*' \
            -not -path 'crates/*/examples/*' \
            -not -path 'crates/*/fuzz/*' 2>/dev/null | sort || true)
          if [ "${#sources[@]}" -eq 0 ]; then
            echo "::error::No production crate sources found; refusing to silently pass."
            exit 1
          fi
          violations="$(grep -nE '^\s*use\s+alloy_primitives::hex::encode(\s*;|\s+as\s)' "${sources[@]}" 2>/dev/null || true)"
          if [ -n "$violations" ]; then
            printf '%s\n' "$violations" >&2
            echo "::error::Never-swap fence: importing alloy_primitives::hex::encode unqualified into production sources enables the legacy format!(\"0x{}\", encode(...)) hand-roll without the regex companion catching it. Use alloy_primitives::hex::encode_prefixed (ADR 0052)."
            exit 1
          fi
