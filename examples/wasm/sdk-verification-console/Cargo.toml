[package]
name = "cow-sdk-examples-wasm"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.1"
publish = false
license-file = "../../../LICENSE"
repository = "https://github.com/cowdao-grants/cow-rs"
description = "WASM consumer-facing capability example for cow-rs"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
console_error_panic_hook = "0.1.7"
cow-sdk = { path = "../../../crates/sdk" }
cow-sdk-subgraph = { path = "../../../crates/subgraph" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
wasm-bindgen.workspace = true
wasm-bindgen-futures.workspace = true

[dev-dependencies]
wasm-bindgen-test.workspace = true
